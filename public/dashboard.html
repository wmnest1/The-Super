<!-- ══ TEXT REMINDERS CARD — paste above </body> in public/dashboard.html ══ -->
<script>
(function(){
  var css = ''
  +'#rem-card-wrap{padding:12px 20px 0}'
  +'.rem-card{background:var(--panel);border:1px solid #2a3a5e;border-radius:10px;overflow:hidden}'
  +'.rem-hdr{background:#0f1a2e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}'
  +'.rem-hdr h3{font-size:13px;color:var(--accent);margin:0}'
  +'.rem-body{padding:12px 16px;display:none}'
  +'.rem-row{display:flex;align-items:center;gap:10px;padding:6px 0;flex-wrap:wrap;font-size:13px}'
  +'.rem-row label{color:#aac;display:flex;align-items:center;gap:7px;cursor:pointer}'
  +'.rem-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}'
  +'.rem-row input[type=time],.rem-row input[type=tel],.rem-row select{background:#0f1a2e;border:1px solid #2a3a5e;border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px}'
  +'.rem-btn{background:var(--accent);border:none;border-radius:6px;color:#1a1a2e;padding:7px 16px;font-size:12px;font-weight:bold;cursor:pointer}'
  +'.rem-btn.sec{background:#0f3460;color:#aac;border:1px solid #2a3a5e}'
  +'.rem-btn.sec:hover{background:#1a4a8a;color:#fff}'
  +'#rem-status{font-size:12px;color:#8c8;min-height:16px}'
  +'html.light .rem-hdr{background:#f5f5f5}'
  +'html.light .rem-row label{color:#555}'
  +'html.light .rem-row input[type=time],html.light .rem-row input[type=tel],html.light .rem-row select{background:#fff;border-color:#ccc;color:#111}';
  var st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  var flagsWrap = document.getElementById('flags-wrap');
  if (!flagsWrap) return;
  var wrap = document.createElement('div');
  wrap.id = 'rem-card-wrap';
  wrap.innerHTML = '<div class="rem-card">'
    + '<div class="rem-hdr" id="rem-hdr"><h3>🔔 Text Reminders</h3><span id="rem-summary" style="color:#667;font-size:12px">▾</span></div>'
    + '<div class="rem-body" id="rem-body">'
    + '<div class="rem-row"><label><input type="checkbox" id="rem-enabled"> Reminders on</label>'
    + '<input type="tel" id="rem-phone" placeholder="+14085551234" style="width:150px" title="Your cell, format +1XXXXXXXXXX"></div>'
    + '<div class="rem-row"><label><input type="checkbox" id="rem-appt"> Appointment alerts</label>'
    + '<select id="rem-lead"><option value="15">15 min before</option><option value="30" selected>30 min before</option><option value="60">1 hour before</option></select></div>'
    + '<div class="rem-row"><label><input type="checkbox" id="rem-digest"> Morning digest (today\'s appointments)</label>'
    + '<input type="time" id="rem-digest-time" value="06:30"></div>'
    + '<div class="rem-row"><label><input type="checkbox" id="rem-nudge"> Evening nudge if no hours logged</label>'
    + '<input type="time" id="rem-nudge-time" value="18:00"></div>'
    + '<div class="rem-row" style="margin-top:6px;gap:8px">'
    + '<button class="rem-btn" onclick="remSave()">💾 Save</button>'
    + '<button class="rem-btn sec" onclick="remTest()">📱 Send test text</button>'
    + '<span id="rem-status"></span></div>'
    + '</div></div>';
  flagsWrap.parentNode.insertBefore(wrap, flagsWrap);

  document.getElementById('rem-hdr').addEventListener('click', function(){
    var b = document.getElementById('rem-body');
    b.style.display = b.style.display === 'block' ? 'none' : 'block';
  });

  function stat(msg, bad){
    var el = document.getElementById('rem-status');
    el.textContent = msg;
    el.style.color = bad ? '#e88' : '#8c8';
    if (msg) setTimeout(function(){ el.textContent=''; }, 6000);
  }

  window.remSave = async function(){
    var body = {
      enabled: document.getElementById('rem-enabled').checked,
      phone: document.getElementById('rem-phone').value.trim(),
      apptAlerts: document.getElementById('rem-appt').checked,
      apptLeadMin: document.getElementById('rem-lead').value,
      digest: document.getElementById('rem-digest').checked,
      digestTime: document.getElementById('rem-digest-time').value,
      nudge: document.getElementById('rem-nudge').checked,
      nudgeTime: document.getElementById('rem-nudge-time').value
    };
    if (body.enabled && !body.phone){ stat('Enter your cell number first', true); return; }
    try {
      var r = await fetch('/api/reminder-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      var d = await r.json();
      if (d.ok){ stat('✓ Saved'); paintSummary(d.settings); }
      else stat(d.error || 'Save failed', true);
    } catch(e){ stat('Save failed', true); }
  };

  window.remTest = async function(){
    var phone = document.getElementById('rem-phone').value.trim();
    stat('Sending…');
    try {
      var r = await fetch('/api/test-text', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone: phone }) });
      var d = await r.json();
      if (d.ok) stat('✓ Test text sent — check your phone');
      else stat(d.error || 'Send failed', true);
    } catch(e){ stat('Send failed', true); }
  };

  function paintSummary(s){
    var el = document.getElementById('rem-summary');
    if (!s || !s.enabled){ el.textContent = 'off ▾'; return; }
    var bits = [];
    if (s.apptAlerts) bits.push(s.apptLeadMin + 'm alerts');
    if (s.digest) bits.push('digest ' + s.digestTime);
    if (s.nudge) bits.push('nudge ' + s.nudgeTime);
    el.textContent = (bits.join(' · ') || 'on') + ' ▾';
  }

  (async function(){
    try {
      var r = await fetch('/api/reminder-settings');
      var s = await r.json();
      document.getElementById('rem-enabled').checked = !!s.enabled;
      document.getElementById('rem-phone').value = s.phone || '';
      document.getElementById('rem-appt').checked = !!s.apptAlerts;
      document.getElementById('rem-lead').value = String(s.apptLeadMin || 30);
      document.getElementById('rem-digest').checked = !!s.digest;
      document.getElementById('rem-digest-time').value = s.digestTime || '06:30';
      document.getElementById('rem-nudge').checked = !!s.nudge;
      document.getElementById('rem-nudge-time').value = s.nudgeTime || '18:00';
      paintSummary(s);
      if (s.configured === false){
        document.getElementById('rem-body').style.display = 'block';
        stat('Twilio not set up yet — add the 3 env vars in Render', true);
      }
    } catch(e) {}
  })();
})();
</script>
