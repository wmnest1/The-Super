<script>
(function(){
  // ---- Styles ----
  const css = ''
    + '#docs-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center}'
    + '#docs-overlay.active{display:flex}'
    + '#docs-modal{background:var(--panel,#16213e);border:1px solid #2a3a5e;border-radius:12px;width:min(560px,94vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}'
    + '#docs-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #2a3a5e;font-weight:bold;font-size:15px}'
    + '#docs-close{background:none;border:none;color:#778;font-size:18px;cursor:pointer}'
    + '#docs-list{overflow-y:auto;padding:8px 18px;flex:1}'
    + '.docs-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e2c47;font-size:13px;flex-wrap:wrap}'
    + '.docs-row:last-child{border-bottom:none}'
    + '.docs-name{flex:1;min-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}'
    + '.docs-tag{font-size:10px;padding:1px 7px;border-radius:8px;white-space:nowrap}'
    + '.docs-tag.invoice{background:#1a2f4e;color:#8ab4ff}.docs-tag.proposal{background:#173a1a;color:#7be07b}'
    + '.docs-tag.file{background:#2a2a3a;color:#99a}.docs-tag.receipt{background:#3a2a10;color:#ffce7a}'
    + '.docs-tag.permit{background:#2a1a3a;color:#c9a0ff}.docs-tag.contract{background:#173a1a;color:#7be07b}'
    + '.docs-meta{font-size:10px;color:#667;white-space:nowrap}'
    + '.docs-view{color:var(--accent);font-size:12px;cursor:pointer;text-decoration:none;white-space:nowrap}'
    + '.docs-del{background:none;border:none;color:#7a4a4a;cursor:pointer;font-size:12px}'
    + '#docs-foot{padding:12px 18px;border-top:1px solid #2a3a5e;display:flex;gap:10px;align-items:center}'
    + '#docs-upload-btn{background:#0f3460;border:none;border-radius:6px;color:var(--text,#eee);padding:8px 16px;font-size:12px;cursor:pointer}'
    + '#docs-upload-btn:disabled{opacity:.5}'
    + '.docs-empty{padding:20px 0;font-size:12px;color:#667;text-align:center}'
    + '.jp-docs-btn{background:#0f3460;border:none;border-radius:6px;color:var(--text,#eee);padding:7px 12px;font-size:12px;cursor:pointer;margin:6px 0 2px;width:100%}'
    + 'html.light #docs-modal{background:#fff;border-color:#ddd}'
    + 'html.light .docs-row{border-color:#eee}';
  const st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  // ---- Modal shell ----
  const overlay = document.createElement('div');
  overlay.id = 'docs-overlay';
  overlay.innerHTML = '<div id="docs-modal">'
    + '<div id="docs-hdr"><span id="docs-title">\u{1F4C1} Job Docs</span><button id="docs-close" onclick="closeDocsModal()">\u2715</button></div>'
    + '<div id="docs-list"><div class="docs-empty">Loading\u2026</div></div>'
    + '<div id="docs-foot">'
    + '<input type="file" id="docs-file-input" accept="image/*,.pdf,.docx,.xlsx,.xls,.csv,.txt,.md" style="display:none" onchange="docsHandleUpload(event)">'
    + '<button id="docs-upload-btn" onclick="document.getElementById(\'docs-file-input\').click()">\u2B06 Upload to this job</button>'
    + '<span id="docs-upload-status" style="font-size:11px;color:#667"></span>'
    + '</div></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDocsModal(); });

  let docsCurrentProject = null;

  window.openDocsModal = function(proj){
    docsCurrentProject = proj;
    document.getElementById('docs-title').textContent = '\u{1F4C1} Job Docs — ' + proj;
    document.getElementById('docs-overlay').classList.add('active');
    refreshDocsList();
  };
  window.closeDocsModal = function(){
    document.getElementById('docs-overlay').classList.remove('active');
  };

  function fmtDocWhen(iso){
    return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtSize(bytes){
    if (!bytes) return '';
    if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes > 1024) return Math.round(bytes / 1024) + ' KB';
    return bytes + ' B';
  }
  function escD(s){ return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

  async function refreshDocsList(){
    const listEl = document.getElementById('docs-list');
    listEl.innerHTML = '<div class="docs-empty">Loading\u2026</div>';
    let files = [];
    try {
      const res = await fetch('/api/docs?project=' + encodeURIComponent(docsCurrentProject));
      files = await res.json();
      if (!Array.isArray(files)) files = [];
    } catch (e) { files = []; }

    // Merge in e-signature proposals for this project (stored separately in data.proposals)
    const sigProps = ((typeof data !== 'undefined' && data.proposals) || [])
      .filter(p => p.project === docsCurrentProject)
      .map(p => ({
        id: null, sig: true, token: p.id,
        name: (p.subject || 'Proposal') + (p.status === 'accepted' ? ' (signed)' : ''),
        docType: 'proposal',
        uploadedAt: p.acceptedAt || p.sentDate,
        size: 0
      }));

    const rows = [...files, ...sigProps].sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

    if (!rows.length) {
      listEl.innerHTML = '<div class="docs-empty">No documents for this job yet.<br>Invoices and proposals you send are saved here automatically \u2014 or upload a file below.</div>';
      return;
    }

    listEl.innerHTML = rows.map(d => {
      const href = d.sig ? ('/proposal/' + d.token) : ('/api/docs/' + d.id + '/view');
      const tag = escD(d.docType || 'file');
      return '<div class="docs-row">'
        + '<span class="docs-name" title="' + escD(d.name) + '">' + escD(d.name) + '</span>'
        + '<span class="docs-tag ' + tag + '">' + tag + '</span>'
        + '<span class="docs-meta">' + fmtDocWhen(d.uploadedAt) + (d.size ? ' \u00b7 ' + fmtSize(d.size) : '') + '</span>'
        + '<a class="docs-view" href="' + href + '" target="_blank">View \u2192</a>'
        + (d.sig ? '' : '<button class="docs-del" onclick="docsDelete(\'' + d.id + '\')" title="Delete">\u2715</button>')
        + '</div>';
    }).join('');
  }

  window.docsDelete = async function(id){
    if (!confirm('Delete this document? This cannot be undone.')) return;
    try {
      await fetch('/api/docs/' + id, { method: 'DELETE' });
    } catch (e) {}
    refreshDocsList();
  };

  window.docsHandleUpload = async function(event){
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;
    if (file.size > 9 * 1024 * 1024) { document.getElementById('docs-upload-status').textContent = 'Too large — keep files under 9 MB.'; return; }
    const statusEl = document.getElementById('docs-upload-status');
    const btn = document.getElementById('docs-upload-btn');
    statusEl.textContent = 'Uploading\u2026';
    btn.disabled = true;
    try {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      const b64 = btoa(binary);
      const res = await fetch('/api/docs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project: docsCurrentProject, name: file.name, mimeType: file.type || 'application/octet-stream', data: b64 })
      });
      const j = await res.json();
      if (!res.ok || j.error) throw new Error(j.error || 'Upload failed');
      statusEl.textContent = 'Saved \u2713';
      setTimeout(() => { statusEl.textContent = ''; }, 2500);
      refreshDocsList();
    } catch (e) {
      statusEl.textContent = 'Upload failed: ' + e.message;
    }
    btn.disabled = false;
  };

  // ---- Add the Job Docs button to every job panel (T&M and Fixed Price) ----
  const _prevRJP = window.renderJobPanel;
  window.renderJobPanel = function(proj){
    let html = _prevRJP(proj);
    const btn = '<button class="jp-docs-btn" onclick="openDocsModal(\'' + proj.replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\')">\u{1F4C1} Job Docs</button>';
    html = html.replace('<div class="pay-section">', btn + '<div class="pay-section">');
    return html;
  };
  if (typeof window.renderJobPanels === 'function') try { renderJobPanels(); } catch(e){}
})();
</script>
<!-- ══ FLOATING JOB PANELS v1 — paste above </body>, AFTER all other snippets ══ -->
<script>
(function(){
  const MAX_FLOATS = 3;
  const LS_KEY = 'jpFloaters_v1';
  let zCounter = 8000;
  let restored = false;

  // ---- Styles ----
  const css = ''
    + '.jp-float{position:fixed;z-index:8000;background:var(--panel,#16213e);border:2px solid var(--accent,#e8a020);border-radius:12px;box-shadow:0 10px 36px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;resize:both;min-width:330px;min-height:280px;width:430px;height:560px}'
    + '.jp-float-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 12px;background:#0f3460;cursor:move;user-select:none;flex-shrink:0;font-size:13px;font-weight:bold}'
    + '.jp-float-bar span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}'
    + '.jp-float-x{background:none;border:none;color:#aab;font-size:15px;cursor:pointer;flex-shrink:0;padding:0 2px}'
    + '.jp-float-x:hover{color:#fff}'
    + '.jp-float-body{overflow-y:auto;flex:1;padding:0 4px 8px}'
    + '.jp-float-body .job-panel{margin:0;box-shadow:none}'
    + '#panels-wrap .job-panel .jp-header{cursor:pointer}'
    + '#panels-wrap .job-panel .jp-header:hover{filter:brightness(1.12)}'
    + '.jp-float .jp-header{cursor:default}'
    + '.modal-overlay{z-index:8990 !important}'; // keep hour/day modals above floaters
  const st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  // ---- Tag every panel with its project name so clicks can identify it ----
  const _prevRJP_flt = window.renderJobPanel;
  window.renderJobPanel = function(proj){
    let html = _prevRJP_flt(proj);
    const attr = String(proj).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    html = html.replace('<div class="job-panel">', '<div class="job-panel" data-proj="' + attr + '">');
    return html;
  };

  // ---- Remap element IDs inside a floater so its forms don't collide with the bottom panel's ----
  function remapIds(html, proj){
    const projId = String(proj).replace(/[^a-z0-9]/gi, '_');
    const fid = projId + '_flt';
    return html
      .split('id="payform-' + projId + '"').join('id="payform-' + fid + '"')
      .split('id="pf-date-' + projId + '"').join('id="pf-date-' + fid + '"')
      .split('id="pf-check-' + projId + '"').join('id="pf-check-' + fid + '"')
      .split('id="pf-amt-' + projId + '"').join('id="pf-amt-' + fid + '"')
      .split('id="pf-notes-' + projId + '"').join('id="pf-notes-' + fid + '"')
      .split('id="burden-input-' + projId + '"').join('id="burden-input-' + fid + '"')
      .split("togglePayForm('" + projId + "')").join("togglePayForm('" + fid + "')")
      .split("saveBurdenPct('" + projId + "')").join("saveBurdenPct('" + fid + "')")
      .split(",'" + projId + "')").join(",'" + fid + "')");
  }

  // ---- State persistence ----
  function loadState(){
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || { open: [], pos: {} }; }
    catch (e) { return { open: [], pos: {} }; }
  }
  function saveState(){
    const open = [...document.querySelectorAll('.jp-float')].map(f => f.dataset.proj);
    const state = loadState();
    state.open = open;
    for (const f of document.querySelectorAll('.jp-float')) {
      state.pos[f.dataset.proj] = { x: f.offsetLeft, y: f.offsetTop, w: f.offsetWidth, h: f.offsetHeight };
    }
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function bringToFront(el){
    zCounter += 1;
    el.style.zIndex = zCounter;
  }

  window.openJobFloat = function(proj){
    // Already open → bring to front
    const existing = [...document.querySelectorAll('.jp-float')].find(f => f.dataset.proj === proj);
    if (existing) { bringToFront(existing); return; }

    // Cap: close the oldest
    const floats = document.querySelectorAll('.jp-float');
    if (floats.length >= MAX_FLOATS) closeJobFloat(floats[0].dataset.proj);

    const state = loadState();
    const pos = state.pos[proj] || {};
    const idx = document.querySelectorAll('.jp-float').length;

    const wrap = document.createElement('div');
    wrap.className = 'jp-float';
    wrap.dataset.proj = proj;
    wrap.style.left = (pos.x != null ? pos.x : 80 + idx * 40) + 'px';
    wrap.style.top = (pos.y != null ? pos.y : 80 + idx * 40) + 'px';
    if (pos.w) wrap.style.width = pos.w + 'px';
    if (pos.h) wrap.style.height = pos.h + 'px';

    const safe = String(proj).replace(/</g, '&lt;');
    wrap.innerHTML = '<div class="jp-float-bar"><span>\u{1F4CC} ' + safe + '</span><button class="jp-float-x" title="Close">\u2715</button></div>'
      + '<div class="jp-float-body"></div>';

    document.body.appendChild(wrap);
    bringToFront(wrap);
    refreshFloatBody(wrap);

    // Close button
    wrap.querySelector('.jp-float-x').addEventListener('click', () => closeJobFloat(proj));
    // Any click brings to front
    wrap.addEventListener('pointerdown', () => bringToFront(wrap));

    // Dragging via the titlebar
    const bar = wrap.querySelector('.jp-float-bar');
    bar.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.jp-float-x')) return;
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const origL = wrap.offsetLeft, origT = wrap.offsetTop;
      function move(ev){
        let nl = origL + (ev.clientX - startX);
        let nt = origT + (ev.clientY - startY);
        nl = Math.max(-wrap.offsetWidth + 80, Math.min(nl, window.innerWidth - 60));
        nt = Math.max(0, Math.min(nt, window.innerHeight - 40));
        wrap.style.left = nl + 'px';
        wrap.style.top = nt + 'px';
      }
      function up(){
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        saveState();
      }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });

    // Persist size changes from the native resize handle
    if (window.ResizeObserver) {
      let t = null;
      new ResizeObserver(() => { clearTimeout(t); t = setTimeout(saveState, 400); }).observe(wrap);
    }

    saveState();
  };

  window.closeJobFloat = function(proj){
    const f = [...document.querySelectorAll('.jp-float')].find(x => x.dataset.proj === proj);
    if (f) f.remove();
    saveState();
  };

  function refreshFloatBody(wrap){
    const proj = wrap.dataset.proj;
    try {
      wrap.querySelector('.jp-float-body').innerHTML = remapIds(window.renderJobPanel(proj), proj);
    } catch (e) {
      wrap.querySelector('.jp-float-body').innerHTML = '<div style="padding:16px;font-size:12px;color:#889">Could not load this job\u2019s panel. The project may have been renamed or deleted.</div>';
    }
  }

  function refreshAllFloats(){
    for (const f of document.querySelectorAll('.jp-float')) refreshFloatBody(f);
  }

  // ---- Open on header click (bottom panels only, not inside floaters) ----
  document.addEventListener('click', (e) => {
    const hdr = e.target.closest('.jp-header');
    if (!hdr || e.target.closest('.jp-float')) return;
    const panel = hdr.closest('.job-panel');
    const proj = panel && panel.dataset ? panel.dataset.proj : null;
    if (proj) openJobFloat(proj);
  });

  // ---- Keep floaters in sync with every dashboard refresh, restore saved ones on first load ----
  const _prevRender_flt = window.render;
  if (typeof _prevRender_flt === 'function') {
    window.render = function(){
      _prevRender_flt();
      if (!restored) {
        restored = true;
        const state = loadState();
        for (const proj of (state.open || []).slice(0, MAX_FLOATS)) {
          if ((data.projects || []).some(p => (p.name || '') === proj)) openJobFloat(proj);
        }
      }
      refreshAllFloats();
    };
  }
})();
</script>
<!-- ══ PANEL REORDER v2 + STORE PICKER FIX — paste above </body>. If "JOB PANEL REORDER v1" is already at the bottom of this file, DELETE from that comment line to the end and paste this instead. ══ -->
<script>
(function(){
  // ════ FIX 1: Store field — click it to get the full store list immediately ════
  // The store box uses a browser suggestion list that filters by the typed text,
  // so with "Home Depot" in it the arrow had nothing to show. Now: clicking the
  // field clears it (opening the full list) and restores the old value if you
  // click away without picking anything.
  document.addEventListener('focusin', function(e){
    if (e.target && e.target.id === 'qa-store' && e.target.value) {
      e.target.dataset.prevStore = e.target.value;
      e.target.value = '';
    }
  });
  document.addEventListener('focusout', function(e){
    if (e.target && e.target.id === 'qa-store') {
      if (!e.target.value && e.target.dataset.prevStore) e.target.value = e.target.dataset.prevStore;
      delete e.target.dataset.prevStore;
    }
  });

  // ════ FIX 2: Drag job panels left/right to reorder (v2) ════
  const LS_KEY = 'jpPanelOrder_v1';
  let dragProj = null;

  const css = ''
    + '#panels-wrap .job-panel .jp-header{cursor:grab}'
    + '#panels-wrap .job-panel .jp-header:active{cursor:grabbing}'
    + '#panels-wrap .job-panel.jp-dragging{opacity:.45}'
    + '#panels-wrap .job-panel.jp-dragtarget{outline:2px dashed var(--accent,#e8a020);outline-offset:3px}';
  const st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  function getOrder(){
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch (e) { return []; }
  }
  function saveOrderFromDom(){
    const names = [...document.querySelectorAll('#panels-wrap .job-panel')].map(p => p.dataset.proj).filter(Boolean);
    try { localStorage.setItem(LS_KEY, JSON.stringify(names)); } catch (e) {}
  }
  function clearMarks(){
    document.querySelectorAll('#panels-wrap .job-panel.jp-dragging, #panels-wrap .job-panel.jp-dragtarget')
      .forEach(p => p.classList.remove('jp-dragging', 'jp-dragtarget'));
  }

  function setupPanel(panel){
    if (panel.dataset.jpDragWired) return;
    panel.dataset.jpDragWired = '1';
    const hdr = panel.querySelector('.jp-header');
    if (!hdr) return;

    hdr.addEventListener('mousedown', () => { panel.setAttribute('draggable', 'true'); });

    panel.addEventListener('dragstart', (e) => {
      dragProj = panel.dataset.proj;
      panel.classList.add('jp-dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', dragProj || 'panel'); } catch (err) {}
    });

    panel.addEventListener('dragend', () => {
      panel.removeAttribute('draggable');
      dragProj = null;
      clearMarks();
      saveOrderFromDom();
    });

    panel.addEventListener('dragover', (e) => {
      if (!dragProj || panel.dataset.proj === dragProj) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const dragged = document.querySelector('#panels-wrap .job-panel.jp-dragging');
      if (!dragged) return;
      const rect = panel.getBoundingClientRect();
      const before = e.clientX < rect.left + rect.width / 2;
      if (before) panel.parentNode.insertBefore(dragged, panel);
      else panel.parentNode.insertBefore(dragged, panel.nextSibling);
    });

    panel.addEventListener('drop', (e) => { e.preventDefault(); });
  }

  // If a header mousedown never became a drag (it was just a click), un-arm draggable
  document.addEventListener('mouseup', () => {
    document.querySelectorAll('#panels-wrap .job-panel[draggable="true"]').forEach(p => {
      if (!p.classList.contains('jp-dragging')) p.removeAttribute('draggable');
    });
  });

  // Allow drops anywhere in the panels area so the browser doesn't animate a "fly back"
  document.addEventListener('dragover', (e) => {
    if (dragProj && e.target.closest && e.target.closest('#panels-wrap')) e.preventDefault();
  });
  document.addEventListener('drop', (e) => {
    if (dragProj && e.target.closest && e.target.closest('#panels-wrap')) e.preventDefault();
  });

  function applyOrderAndWire(){
    const panels = [...document.querySelectorAll('#panels-wrap .job-panel')];
    if (!panels.length) return;
    const order = getOrder();
    if (order.length && panels.length > 1) {
      const byName = {};
      panels.forEach(p => { if (p.dataset.proj) byName[p.dataset.proj] = p; });
      const parent = panels[0].parentNode;
      const seq = [
        ...order.filter(n => byName[n]).map(n => byName[n]),
        ...panels.filter(p => !order.includes(p.dataset.proj))
      ];
      for (const p of seq) parent.appendChild(p);
    }
    document.querySelectorAll('#panels-wrap .job-panel').forEach(setupPanel);
  }

  const _prevRenderJobPanels_ord2 = window.renderJobPanels;
  if (typeof _prevRenderJobPanels_ord2 === 'function' && !window.__jpReorderWired) {
    window.__jpReorderWired = true;
    window.renderJobPanels = function(){
      _prevRenderJobPanels_ord2();
      applyOrderAndWire();
    };
  }
  try { applyOrderAndWire(); } catch (e) {}
})();
</script>

<script>
(function(){
  var cw = document.getElementById('cw');
  if (!cw) return;

  // Bigger, higher-priority grab zones for the existing handles + a new top-edge handle
  var css = ''
    + '#cw-resize{width:24px !important;height:24px !important;z-index:6 !important}'
    + '#cw-resize-r{width:9px !important;z-index:5 !important}'
    + '#cw-resize-b{height:9px !important;z-index:5 !important}'
    + '#cw-resize-t{position:absolute;top:0;left:44px;right:110px;height:8px;cursor:n-resize;z-index:5}';
  var st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  // Top-edge handle: drag UP to make the widget taller (natural for a bottom-anchored window)
  var t = document.createElement('div');
  t.id = 'cw-resize-t';
  cw.appendChild(t);
  t.addEventListener('mousedown', function(e){
    try { cwResizeStart(e, 'n'); } catch (err) {}
  });

  // Teach the resize mover the new 'n' direction (height grows as you drag up)
  if (typeof cwResizeMove === 'function') {
    var _origMove = cwResizeMove;
    cwResizeMove = function(e){
      try {
        if (cwResizing && cwResizeDir === 'n') {
          var el = document.getElementById('cw');
          var dy = e.clientY - cwResizeStartY;
          el.style.height = Math.max(350, Math.min(Math.floor(window.innerHeight * 0.9), cwResizeStartH - dy)) + 'px';
          return;
        }
      } catch (err) {}
      _origMove(e);
    };
  }

<script>
(function(){
  if (typeof window.cwAddMsg !== 'function') return;

  var css = ''
    + '#cw-msgs .cw-msg.assistant{white-space:normal}'
    + '#cw-msgs .cwm-tbl{border-collapse:collapse;margin:6px 0;font-size:12px;max-width:100%}'
    + '#cw-msgs .cwm-tbl th{color:var(--accent,#e8a020);text-align:left;border-bottom:1px solid #3a4a6e;padding:3px 10px 3px 0;white-space:nowrap}'
    + '#cw-msgs .cwm-tbl td{padding:3px 10px 3px 0;border-bottom:1px solid #22304e;vertical-align:top}'
    + '#cw-msgs .cwm-ul,#cw-msgs .cwm-ol{margin:4px 0 4px 18px;padding:0}'
    + '#cw-msgs .cwm-ul li,#cw-msgs .cwm-ol li{margin:2px 0}'
    + '#cw-msgs .cwm-h{font-weight:bold;color:var(--accent,#e8a020);margin:6px 0 2px}'
    + '#cw-msgs .cwm-hr{border:none;border-top:1px solid #2a3a5e;margin:6px 0}'
    + '#cw-msgs .cw-msg code{background:rgba(0,0,0,.3);padding:0 4px;border-radius:3px;font-size:12px}';
  var st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inline(s){
    return s
      .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
      .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<i>$2</i>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  function mdToHtml(text){
    var lines = esc(String(text)).split('\n');
    var out = [], i = 0;
    while (i < lines.length) {
      var ln = lines[i];

      // Table block: consecutive |...| lines
      if (/^\s*\|.*\|\s*$/.test(ln)) {
        var rows = [];
        while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(lines[i].trim()); i++; }
        var html = '<table class="cwm-tbl">', first = true;
        for (var r = 0; r < rows.length; r++) {
          if (/^\|[\s\-:|]+\|$/.test(rows[r])) continue; // |----|----| separator row
          var cells = rows[r].slice(1, -1).split('|').map(function(c){ return inline(c.trim()); });
          html += '<tr>' + cells.map(function(c){ return first ? '<th>'+c+'</th>' : '<td>'+c+'</td>'; }).join('') + '</tr>';
          first = false;
        }
        out.push(html + '</table>');
        continue;
      }

      // Bulleted list block
      if (/^\s*[-•]\s+/.test(ln)) {
        var items = [];
        while (i < lines.length && /^\s*[-•]\s+/.test(lines[i])) { items.push(lines[i].replace(/^\s*[-•]\s+/,'')); i++; }
        out.push('<ul class="cwm-ul">' + items.map(function(x){ return '<li>'+inline(x)+'</li>'; }).join('') + '</ul>');
        continue;
      }

      // Numbered list block
      if (/^\s*\d+[.)]\s+/.test(ln)) {
        var items2 = [];
        while (i < lines.length && /^\s*\d+[.)]\s+/.test(lines[i])) { items2.push(lines[i].replace(/^\s*\d+[.)]\s+/,'')); i++; }
        out.push('<ol class="cwm-ol">' + items2.map(function(x){ return '<li>'+inline(x)+'</li>'; }).join('') + '</ol>');
        continue;
      }

      // Header
      var h = ln.match(/^(#{1,3})\s+(.*)/);
      if (h) { out.push('<div class="cwm-h">' + inline(h[2]) + '</div>'); i++; continue; }

      // Horizontal rule
      if (/^\s*---+\s*$/.test(ln)) { out.push('<hr class="cwm-hr">'); i++; continue; }

      out.push(inline(ln));
      i++;
    }

    var htmlOut = '';
    for (var k = 0; k < out.length; k++) {
      var seg = out[k];
      var isBlock = /^<(table|ul|ol|div|hr)/.test(seg);
      htmlOut += seg;
      if (!isBlock && k < out.length - 1) htmlOut += '<br>';
    }
    return htmlOut;
  }

  var _origAddMsg = window.cwAddMsg;
  window.cwAddMsg = function(text, type){
    // Only format plain-text assistant replies; HTML documents (invoices etc.) pass through untouched
    if (type === 'assistant' && typeof text === 'string' && !/<[a-z][\s\S]*>/i.test(text)) {
      var msgs = document.getElementById('cw-msgs');
      if (!msgs) return _origAddMsg(text, type);
      var div = document.createElement('div');
      div.className = 'cw-msg assistant';
      div.innerHTML = mdToHtml(text);
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }
    return _origAddMsg(text, type);
  };
})();
</script>

<script>
(function(){
  if (typeof window.computeAutoFlags !== 'function') return;

  function balanceFor(proj){
    var p = (data.projects || []).find(function(x){ return (x.name || '') === proj; });
    var rate = billingRate(proj), oosR = oosRateFor(proj);
    var fixed = !!(p && p.billingType === 'fixed');
    function itemPct(m){
      if (m && m.markupPct != null && !isNaN(parseFloat(m.markupPct))) return parseFloat(m.markupPct);
      if (p && p.markup !== undefined && p.markup !== '' && !isNaN(parseFloat(p.markup))) return parseFloat(p.markup);
      return 15;
    }
    function subPctF(m){
      if (m && m.markupPct != null && !isNaN(parseFloat(m.markupPct))) return parseFloat(m.markupPct);
      if (p && p.subMarkup !== undefined && p.subMarkup !== '' && !isNaN(parseFloat(p.subMarkup))) return parseFloat(p.subMarkup);
      return 0;
    }
    var cos = ((data.changeOrders || {})[proj] || []).filter(function(c){ return c.status === 'open'; });
    var labor = 0, matB = 0, subB = 0, coGrand = 0;
    var allEnt = entriesForProject(proj);

    // Change orders first (same rules as the panels)
    for (var ci = 0; ci < cos.length; ci++) {
      var co = cos[ci];
      var hrs = 0, coMatBilled = 0;
      for (var e1 = 0; e1 < allEnt.length; e1++) {
        var en1 = allEnt[e1];
        var cr = en1.crew || [];
        for (var k1 = 0; k1 < cr.length; k1++) if (cr[k1].coId === co.id) hrs += parseFloat(cr[k1].hours || 0) || 0;
        var ms = en1.materials || [];
        for (var k2 = 0; k2 < ms.length; k2++) if (ms[k2].coId === co.id) coMatBilled += (parseFloat(ms[k2].cost || 0) || 0) * (1 + itemPct(ms[k2]) / 100);
      }
      coGrand += (co.type === 'fixed') ? (parseFloat(co.fixedAmount || 0) || 0) : (hrs * oosR + coMatBilled);
    }

    // Base work (CO items excluded)
    for (var e2 = 0; e2 < allEnt.length; e2++) {
      var en = allEnt[e2];
      var crew = en.crew || [];
      for (var i = 0; i < crew.length; i++) {
        var c = crew[i];
        if (c.coId || c.changeOrder) continue;
        var h = parseFloat(c.hours || 0) || 0;
        var oh = parseFloat(c.oosHours || 0) || 0;
        if (!fixed) {
          if (c.outOfScope) labor += h * oosR;
          else labor += h * rate + oh * oosR;
        }
      }
      var mats = en.materials || [];
      for (var j = 0; j < mats.length; j++) {
        var m = mats[j];
        if (m.coId) continue;
        var cc = parseFloat(m.cost || 0) || 0;
        if (!cc) continue;
        if (m.kind === 'sub') subB += cc * (1 + subPctF(m) / 100);
        else matB += cc * (1 + itemPct(m) / 100);
      }
    }

    var revenue;
    if (fixed) revenue = (parseFloat(p && p.contractAmount || 0) || 0) + coGrand;
    else revenue = labor + matB + subB + coGrand;
    var paid = ((data.payments || {})[proj] || []).reduce(function(s, pp){ return s + (parseFloat(pp.amount || 0) || 0); }, 0);
    return revenue - paid;
  }

  window.computeAutoFlags = function(){
    var flags = [];
    // Weekdays with no work logged (unchanged from original)
    var noWorkDays = [];
    var today = new Date();
    var dim = new Date(displayYear, displayMonth + 1, 0).getDate();
    for (var d = 1; d <= dim; d++) {
      var dt = new Date(displayYear, displayMonth, d);
      if (dt > today) break;
      var dow = dt.getDay();
      if (dow >= 1 && dow <= 5) {
        var iso = displayYear + '-' + String(displayMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        if (!entriesForDate(iso).length) noWorkDays.push(iso);
      }
    }
    if (noWorkDays.length > 0) flags.push({ icon: '📅', text: noWorkDays.length + ' weekday' + (noWorkDays.length > 1 ? 's' : '') + ' with no work logged', cls: 'flag-warn' });

    // Balance due — now full panel math: labor + materials w/ markup + subs + COs − payments
    var projects = allProjectsInMonth(displayYear, displayMonth);
    for (var pi = 0; pi < projects.length; pi++) {
      var proj = projects[pi];
      var bal = 0;
      try { bal = balanceFor(proj); } catch (e) { continue; }
      if (bal > 1000) flags.push({ icon: '💰', text: proj + ': ' + fmt$(bal) + ' balance due', cls: 'flag-alert' });
    }

    // Hours but no materials (unchanged from original)
    for (var pj = 0; pj < projects.length; pj++) {
      var proj2 = projects[pj];
      var ent = entriesForProjectMonth(proj2, displayYear, displayMonth);
      var hrs = 0;
      for (var e3 = 0; e3 < ent.length; e3++) { var cw = ent[e3].crew || []; for (var q = 0; q < cw.length; q++) hrs += parseFloat(cw[q].hours || 0) || 0; }
      if (hrs >= 40 && matsTotal(ent) === 0) flags.push({ icon: '🧱', text: proj2 + ': ' + hrs + 'hrs but no materials logged', cls: 'flag-warn' });
    }

    if (flags.length === 0) flags.push({ icon: '✅', text: 'All clear — no issues this month', cls: 'flag-good' });
    return flags;
  };

  // Repaint with corrected math
  try { if (typeof renderFlags === 'function') renderFlags(); } catch (e) {}
})();
</script>

(function(){

  function props(){
    try { return (typeof data !== 'undefined' && data && data.proposals) ? data.proposals : []; }
    catch (e) { return []; }
  }

  function sortedTop8(){
    return props().slice().sort((a, b) => {
      const at = new Date(a.acceptedAt || (a.viewedDates||[])[ (a.viewedDates||[]).length-1 ] || a.sentDate);
      const bt = new Date(b.acceptedAt || (b.viewedDates||[])[ (b.viewedDates||[]).length-1 ] || b.sentDate);
      return bt - at;
    }).slice(0, 8);
  }

  window.deleteProposal = async function(id){
    const p = props().find(x => x.id === id);
    if (!p) return;
    const label = (p.project || 'proposal') + ' — ' + (p.clientName || p.clientEmail || '');
    const warn = (p.status === 'accepted')
      ? 'ACCEPTANCE RECORD (signature, date, IP) is deleted too. Only do this for tests.'
      : 'The record is removed from the dashboard.';
    if (!confirm('Delete this proposal record?\n\n' + label + '\n\nThis is permanent: the public link stops working and the ' + warn)) return;
    data.proposals = props().filter(x => x.id !== id);
    try {
      await saveAll();
      if (typeof window.render === 'function') window.render();
    } catch (e) {
      alert('Could not save — try again.');
    }
  };

  function decorate(){
    const wrapEl = document.getElementById('prop-card-wrap');
    if (!wrapEl) return;
    const rows = wrapEl.querySelectorAll('.prop-row');
    if (!rows.length) return;

      if (!p || row.querySelector('.prop-del')) return;

      btn.className = 'prop-del';
      btn.textContent = '\u2715';
      btn.title = 'Delete this proposal record';
      btn.onclick = function(){ deleteProposal(p.id); };
      right.appendChild(btn);
    });
  }

  decorate();
  const target = document.getElementById('prop-card-wrap') || document.body;
  new MutationObserver(function(){ decorate(); }).observe(target, { childList: true, subtree: true });
})();

        html += '<div class="mh-month' + (k === curKey ? ' cur' : '') + '"><span>' + label + '</span><span class="mh-count">' + g.length + ' item' + (g.length > 1 ? 's' : '') + '</span></div>';
        for (const r of g) {
          if (ed && ed.date === r.date && ed.mi === r.mi) { html += matEditRowHtml(r); continue; }
          const m = r.m;
          const tag = m.kind === 'sub' ? '<span class="mh-tag">SUB</span>' : (m.coId ? '<span class="mh-tag">CO</span>' : '');
          const inv = m.invoiceNum ? '<span class="mh-inv">#' + esc(m.invoiceNum) + '</span>' : '';
          const store = m.store ? '<span class="mh-store" title="' + esc(m.store) + '">' + esc(m.store) + '</span>' : '';
          html += '<div class="mh-row">'
            + '<span class="mh-date">' + esc(r.date.slice(5)) + '</span>'
            + store + tag
            + '<span class="mh-desc" title="' + esc(m.description || '') + '">' + (esc(m.description || '') || '<span style="color:#556">(no description)</span>') + inv + '</span>'
            + '<span class="mh-cost">' + fmtM(r.cost) + '</span>'
            + '<span class="mh-billed" title="billed at ' + r.pct + '% markup">' + fmtM(r.billed) + '</span>'
            + '<button class="mh-icon" title="Edit this line" onclick="mhEditStart(\'' + r.date + '\',' + r.mi + ')">\u270e</button>'
            + '<button class="mh-icon" title="Delete" onclick="mhDelete(\'' + jsq(proj) + '\',\'' + r.date + '\',' + r.mi + ')">\u2715</button>'
            + '</div>';
        }
        html += '<div class="mh-sub"><span>' + label + ' subtotal:</span><span>cost <b>' + fmtM(mCost) + '</b></span><span>billed <b>' + fmtM(mBilled) + '</b></span></div>';
      }
      html += '<div class="mh-tot"><span>' + rows.length + ' items all-time</span><span>Cost <b>' + fmtM(gTotCost) + '</b></span><span>Markup <b>' + fmtM(r2(gTotBilled - gTotCost)) + '</b></span><span>Billed <b>' + fmtM(gTotBilled) + '</b></span></div>';
      body.innerHTML = html;
    }

    const stores = [...new Set((d.entries || []).flatMap(e => (e.materials || []).map(m => (m.store || '').trim())).filter(Boolean))].sort();
    const todayIso = (typeof today !== 'undefined' && /^\d{4}-\d{2}-\d{2}$/.test(today)) ? today : new Date().toISOString().slice(0, 10);
    document.getElementById('mh-add').innerHTML = ''
      + '<b style="font-size:11px;color:var(--accent,#e8a020)">+ Add purchase</b>'
      + '<input type="date" id="mh-a-date" value="' + todayIso + '">'
      + '<input type="text" id="mh-a-store" list="mh-stores" placeholder="Store" style="width:110px">'
      + '<datalist id="mh-stores">' + stores.map(s => '<option value="' + esc(s) + '">').join('') + '</datalist>'
      + '<input type="text" id="mh-a-desc" placeholder="Description" style="flex:1;min-width:120px">'
      + '<input type="number" id="mh-a-amt" placeholder="$" step="0.01" style="width:84px">'
      + '<input type="text" id="mh-a-inv" placeholder="Invoice#" style="width:84px">'
      + '<label><input type="checkbox" id="mh-a-sub"> Sub</label>'
      + '<button id="mh-add-btn">Add</button>';
    document.getElementById('mh-add-btn').onclick = mhAdd;
  }

  function matEditRowHtml(r){
    const m = r.m;
    return '<div class="mh-editrow">'
      + '<input type="date" id="mh-e-date" value="' + r.date + '">'
      + '<input type="text" id="mh-e-store" value="' + esc(m.store || '') + '" placeholder="Store" style="width:100px" list="mh-stores">'
      + '<input type="text" id="mh-e-desc" value="' + esc(m.description || '') + '" placeholder="Description" style="flex:1;min-width:110px">'
      + '<input type="number" id="mh-e-amt" value="' + (parseFloat(m.cost || 0) || 0) + '" step="0.01" style="width:80px">'
      + '<input type="text" id="mh-e-inv" value="' + esc(m.invoiceNum || '') + '" placeholder="Inv#" style="width:76px">'
      + '<label><input type="checkbox" id="mh-e-sub"' + (m.kind === 'sub' ? ' checked' : '') + '> Sub</label>'
      + '<label>Mk% <input type="number" id="mh-e-pct" value="' + (m.markupPct != null ? m.markupPct : '') + '" placeholder="auto" step="0.5" style="width:58px"></label>'
      + '<button class="mh-save" onclick="mhEditSave()">Save</button>'
      + '<button class="mh-cancel" onclick="mhEditCancel()">Cancel</button>'
      + '</div>';
  }

  window.mhEditStart = function(date, mi){
    window.__mhEdit = { date: date, mi: mi };
    rebuildMatHistory();
  };
  window.mhEditCancel = function(){
    window.__mhEdit = null;
    rebuildMatHistory();
  };
  window.mhEditSave = async function(){
    const proj = window.__mhProj, ed = window.__mhEdit, d = getData();
    if (!proj || !ed || !d) return;
    const entry = (d.entries || []).find(e => e.date === ed.date && (e.project || '') === proj);
    if (!entry || !entry.materials || !entry.materials[ed.mi]) { window.__mhEdit = null; rebuildMatHistory(); return; }
    const m = entry.materials[ed.mi];
    const newDate = document.getElementById('mh-e-date').value;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) { alert('Pick a valid date'); return; }
    m.store = document.getElementById('mh-e-store').value.trim();
    m.description = document.getElementById('mh-e-desc').value.trim();
    m.cost = String(parseFloat(document.getElementById('mh-e-amt').value || 0) || 0);
    m.invoiceNum = document.getElementById('mh-e-inv').value.trim();
    if (document.getElementById('mh-e-sub').checked) m.kind = 'sub'; else delete m.kind;
    const pctVal = document.getElementById('mh-e-pct').value;
    if (pctVal !== '' && !isNaN(parseFloat(pctVal))) m.markupPct = parseFloat(pctVal); else delete m.markupPct;
    if (newDate !== ed.date) {
      entry.materials.splice(ed.mi, 1);
      let dest = (d.entries || []).find(e => e.date === newDate && (e.project || '') === proj);
      if (!dest) { dest = { date: newDate, project: proj, crew: [], materials: [], notes: '' }; d.entries.push(dest); }
      if (!dest.materials) dest.materials = [];
      dest.materials.push(m);
    }
    window.__mhEdit = null;
    try {
      await saveAll();
      if (typeof window.render === 'function') window.render();
    } catch (e) { alert('Save failed — try again.'); }
    rebuildMatHistory();
  };

  window.mhDelete = async function(proj, date, mi){
    try {
      await deleteMatInPanel(proj, date, mi);
      rebuildHist();
    } catch (e) {}
  };

  async function mhAdd(){
    const proj = window.__mhProj;
    if (!proj) return;
    const item = {
      project: proj,
      date: document.getElementById('mh-a-date').value,
      store: document.getElementById('mh-a-store').value.trim(),
      description: document.getElementById('mh-a-desc').value.trim(),
      amount: parseFloat(document.getElementById('mh-a-amt').value || 0),
      invoiceNum: document.getElementById('mh-a-inv').value.trim()
    };
    if (document.getElementById('mh-a-sub').checked) item.kind = 'sub';
    if (!item.amount && !item.description) { alert('Enter at least a description or amount'); return; }
    const btn = document.getElementById('mh-add-btn');
    btn.disabled = true; btn.textContent = '\u2026';
    try {
      const r = await fetch('/api/materials/add-batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items: [item] }) });
      const res = await r.json();
      if (!res.ok) throw new Error(res.error || 'Add failed');
      if (typeof loadData === 'function') await loadData();
      if (typeof window.render === 'function') window.render();
      rebuildMatHistory();
    } catch (e) {
      alert('Add failed: ' + e.message);
      btn.disabled = false; btn.textContent = 'Add';
    }
  }

  // ═══ HOURS HISTORY ═══
  function rebuildHrsHistory(){
    const proj = window.__mhProj;
    const d = getData();
    if (!proj || !d) return;
    const p = (d.projects || []).find(x => (x.name || '') === proj);
    const fixed = !!(p && p.billingType === 'fixed');
    const rate = (typeof billingRate === 'function') ? billingRate(proj) : 0;
    const oosR = (typeof oosRateFor === 'function') ? oosRateFor(proj) : rate;

    const rows = [];
    for (const en of (d.entries || [])) {
      if (!en || (en.project || '') !== proj || !en.date) continue;
      const crew = en.crew || [];
      for (const c of crew) {
        const h = parseFloat(c.hours || 0) || 0;
        const oh = parseFloat(c.oosHours || 0) || 0;
        if (h <= 0 && oh <= 0) continue;
        const isCO = !!(c.coId || c.changeOrder);
        const isOOS = !!c.outOfScope;
        let billed = null;
        if (!fixed) {
          if (isCO || isOOS) billed = r2((h + oh) * oosR);
          else billed = r2(h * rate + oh * oosR);
        }
        rows.push({ date: String(en.date), worker: c.name || '(unnamed)', h, oh, isCO, isOOS, billed });
      }
    }
    rows.sort((a, b) => a.date.localeCompare(b.date));

    document.getElementById('mh-title').textContent = '\u{1F4DC} ' + proj + ' — Hours History' + (fixed ? ' (fixed-price: internal, not billed)' : '');
    const body = document.getElementById('mh-body');

    if (!rows.length) {
      body.innerHTML = '<div style="padding:20px;color:#889;font-size:13px">No hours logged for this job yet.</div>';
    } else {
      const curKey = (typeof displayYear !== 'undefined') ? (displayYear + '-' + String(displayMonth + 1).padStart(2, '0')) : '';
      const groups = {};
      for (const r of rows) { const k = r.date.slice(0, 7); (groups[k] = groups[k] || []).push(r); }
      let html = '';
      let gHrs = 0, gBilled = 0;
      for (const k of Object.keys(groups).sort()) {
        const g = groups[k];
        const mHrs = r2(g.reduce((s, r) => s + r.h + r.oh, 0));
        const mBilled = fixed ? 0 : r2(g.reduce((s, r) => s + (r.billed || 0), 0));
        gHrs = r2(gHrs + mHrs);
        gBilled = r2(gBilled + mBilled);
        const byWorker = {};
        for (const r of g) byWorker[r.worker] = r2((byWorker[r.worker] || 0) + r.h + r.oh);
        const label = new Date(k + '-15').toLocaleString('en-US', { month: 'long', year: 'numeric' });
        html += '<div class="mh-month' + (k === curKey ? ' cur' : '') + '"><span>' + label + '</span><span class="mh-count">' + g.length + ' entr' + (g.length > 1 ? 'ies' : 'y') + '</span></div>';
        for (const r of g) {
          const hrsTxt = r.h + r.oh + 'h' + (r.oh > 0 && r.h > 0 ? ' (' + r.oh + ' OOS)' : '');
          const tag = r.isCO ? '<span class="mh-tag">CO</span>' : (r.isOOS || (r.oh > 0 && r.h === 0) ? '<span class="mh-tag">OOS</span>' : '');
          html += '<div class="mh-row">'
            + '<span class="mh-date">' + esc(r.date.slice(5)) + '</span>'
            + '<span class="mh-desc">' + esc(r.worker) + '</span>'
            + tag
            + '<span class="mh-cost">' + hrsTxt + '</span>'
            + (fixed ? '' : '<span class="mh-billed">' + fmtM(r.billed) + '</span>')
            + '<button class="mh-icon" title="Edit this day (opens day editor)" onclick="openDayModal(\'' + r.date + '\')">\u270e</button>'
            + '</div>';
        }
        const workerBits = Object.keys(byWorker).sort().map(w => esc(w) + ' <b>' + byWorker[w] + 'h</b>').join(' \u00b7 ');
        html += '<div class="mh-sub"><span>' + workerBits + '</span><span>' + label + ': <b>' + mHrs + 'h</b></span>' + (fixed ? '' : '<span>billed <b>' + fmtM(mBilled) + '</b></span>') + '</div>';
      }
      html += '<div class="mh-tot"><span>All-time</span><span>Hours <b>' + gHrs + 'h</b></span>' + (fixed ? '' : '<span>Labor Billed <b>' + fmtM(gBilled) + '</b></span>') + '</div>';
      body.innerHTML = html;
    }

    const todayIso = (typeof today !== 'undefined' && /^\d{4}-\d{2}-\d{2}$/.test(today)) ? today : new Date().toISOString().slice(0, 10);
    document.getElementById('mh-add').innerHTML = ''
      + '<span style="font-size:11px;color:#88a">Hours are edited in the day editor \u2014 click \u270e on any line, or</span>'
      + '<button id="mh-log-btn" onclick="openDayModal(\'' + todayIso + '\')">+ Log hours today</button>';
  }

  // ─── Hook render: sort, paint, refresh popup if open ───
  const _prevRender_mh = window.render;
  if (typeof _prevRender_mh === 'function') {
    window.render = function(){
      sortChrono();
      _prevRender_mh();
      if (window.__mhProj) { try { rebuildHist(); } catch (e) {} }
    };
  }
  try { sortChrono(); if (typeof renderJobPanels === 'function') renderJobPanels(); } catch (e) {}
})();
</script>
<!-- ══ PAYMENT EDIT/DELETE v1 — paste above </body>, after all other snippets ══ -->
<script>
(function(){
  const st = document.createElement('style');
  st.textContent = ''
    + '.payx-btn{background:none;border:none;cursor:pointer;font-size:10px;color:#789;padding:0 2px;flex:none}'
    + '.payx-btn:hover{color:#fff}'
    + '.payx-edit{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 6px;background:#101d38;border:1px solid var(--accent,#e8a020);border-radius:6px;margin:2px 0;font-size:11px}'
    + '.payx-edit input{background:#0f1a2e;border:1px solid #2a3a5e;color:#dde;border-radius:4px;padding:3px 5px;font-size:11px}'
    + '.payx-save{background:var(--accent,#e8a020);color:#111;border:none;border-radius:4px;padding:3px 9px;font-weight:bold;cursor:pointer;font-size:11px}'
    + '.payx-cancel{background:none;border:1px solid #445;color:#aab;border-radius:4px;padding:3px 9px;cursor:pointer;font-size:11px}';
  document.head.appendChild(st);

  function getData(){ try { return (typeof data !== 'undefined' && data) ? data : null; } catch (e) { return null; } }
  const fmtM = x => '$' + Number(x).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  let editState = null; // { proj, idx }

  function payRowsIn(panel){
    return [...panel.querySelectorAll('.pay-row')].filter(r => !r.classList.contains('hdr'));
  }

  window.payxDelete = async function(proj, idx){
    const d = getData();
    if (!d || !d.payments || !d.payments[proj] || !d.payments[proj][idx]) return;
    const p = d.payments[proj][idx];
    if (!confirm('Delete this payment?\n\n' + (p.date || 'no date') + '  ' + (p.check ? '#' + p.check + '  ' : '') + fmtM(parseFloat(p.amount || 0) || 0)
      + '\n\nThis raises the balance due for ' + proj + '. This cannot be undone.')) return;
    d.payments[proj].splice(idx, 1);
    editState = null;
    try { await saveAll(); if (typeof window.render === 'function') window.render(); }
    catch (e) { alert('Could not save — try again.'); }
  };

  window.payxEditStart = function(proj, idx){
    editState = { proj: proj, idx: idx };
    decorateAll();
  };
  window.payxEditCancel = function(){
    editState = null;
    if (typeof window.render === 'function') window.render(); else decorateAll();
  };
  window.payxEditSave = async function(){
    const d = getData();
    if (!d || !editState) return;
    const arr = (d.payments || {})[editState.proj];
    const p = arr && arr[editState.idx];
    if (!p) { editState = null; return; }
    const nd = document.getElementById('payx-e-date').value;
    if (nd && !/^\d{4}-\d{2}-\d{2}$/.test(nd)) { alert('Pick a valid date'); return; }
    p.date = nd;
    p.check = document.getElementById('payx-e-check').value.trim();
    p.amount = String(parseFloat(document.getElementById('payx-e-amt').value || 0) || 0);
    p.notes = document.getElementById('payx-e-notes').value.trim();
    editState = null;
    try { await saveAll(); if (typeof window.render === 'function') window.render(); }
    catch (e) { alert('Could not save — try again.'); }
  };

  function decoratePanel(panel){
    const proj = panel.dataset ? panel.dataset.proj : null;
    if (!proj) return;
    const d = getData();
    if (!d) return;
    const pays = (d.payments || {})[proj] || [];
    const rows = payRowsIn(panel);
    rows.forEach((row, i) => {
      const p = pays[i];
      if (!p) return;
      // Editing this row? Swap in the edit strip
      if (editState && editState.proj === proj && editState.idx === i) {
        if (row.dataset.payxEditing) return;
        row.dataset.payxEditing = '1';
        row.innerHTML = '';
        const strip = document.createElement('div');
        strip.className = 'payx-edit';
        strip.innerHTML = ''
          + '<input type="date" id="payx-e-date" value="' + (p.date || '') + '" style="width:118px">'
          + '<input type="text" id="payx-e-check" value="' + String(p.check || '').replace(/"/g, '&quot;') + '" placeholder="Check#" style="width:64px">'
          + '<input type="number" id="payx-e-amt" value="' + (parseFloat(p.amount || 0) || 0) + '" step="0.01" style="width:84px">'
          + '<input type="text" id="payx-e-notes" value="' + String(p.notes || '').replace(/"/g, '&quot;') + '" placeholder="Notes" style="flex:1;min-width:70px">'
          + '<button class="payx-save" onclick="payxEditSave()">Save</button>'
          + '<button class="payx-cancel" onclick="payxEditCancel()">Cancel</button>';
        row.appendChild(strip);
        return;
      }
      if (row.querySelector('.payx-btn') || row.dataset.payxEditing) return;
      const jsProj = String(proj).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const wrap = document.createElement('span');
      wrap.style.cssText = 'flex:none;white-space:nowrap';
      wrap.innerHTML = '<button class="payx-btn" title="Edit payment" onclick="payxEditStart(\'' + jsProj + '\',' + i + ')">\u270e</button>'
        + '<button class="payx-btn" title="Delete payment" onclick="payxDelete(\'' + jsProj + '\',' + i + ')">\u2715</button>';
      row.appendChild(wrap);
    });
  }

  function decorateAll(){
    document.querySelectorAll('.job-panel[data-proj]').forEach(decoratePanel);
  }

  // Decorate now and after any re-render, panel or floater, via observer
  decorateAll();
  new MutationObserver(function(){ decorateAll(); }).observe(document.body, { childList: true, subtree: true });
})();
</script>
<!-- ══ DAY COPY v1 — "Copy last workday" — paste above </body>, after all other snippets ══ -->
<script>
(function(){
  if (typeof window.openDayModal !== 'function') return;

  const st = document.createElement('style');
  st.textContent = ''
    + '.dc-btn{background:#0f3460;border:1px solid #2a4a7e;color:#cdf;border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;margin:0 0 8px 0}'
    + '.dc-btn:hover{border-color:var(--accent,#e8a020);color:#fff}'
    + '.dc-btn:disabled{opacity:.5;cursor:not-allowed}'
    + '.dc-note{font-size:10px;color:#889;margin:0 0 8px 6px}'
    + '.dc-copied{background:#3a3410 !important;border-color:#c8a020 !important}';
  document.head.appendChild(st);

  function findLastWorkday(proj, beforeIso){
    if (!proj) return null;
    let best = null;
    for (const en of (data.entries || [])) {
      if (!en || (en.project || '') !== proj || !en.date) continue;
      if (en.date >= beforeIso) continue;
      const hasWork = (en.crew || []).some(c =>
        (parseFloat(c.hours || 0) || 0) > 0 || (parseFloat(c.oosHours || 0) || 0) > 0
      );
      if (!hasWork) continue;
      if (!best || en.date > best.date) best = en;
    }
    return best;
  }

  function fmtDate(iso){
    try { return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    catch (e) { return iso; }
  }

  window.dcCopyLastWorkday = function(){
    if (!dayModalState) return;
    const { date, project, crewData } = dayModalState;
    const src = findLastWorkday(project, date);
    if (!src) { alert('No prior workday found for ' + project + '.'); return; }

    const current = crewData[project] || [];
    const hasWork = current.some(c => (parseFloat(c.reg || 0) || 0) > 0 || (parseFloat(c.oos || 0) || 0) > 0 || (c.note || '').trim());
    if (hasWork && !confirm('This day already has hours logged for ' + project + '.\n\nCopy over anyway from ' + fmtDate(src.date) + '?')) return;

    const copied = (src.crew || []).map(c => ({
      name: (typeof normName === 'function') ? normName(c.name) : c.name,
      reg: c.outOfScope ? '0' : (c.hours || ''),
      oos: c.outOfScope ? (c.hours || '') : (c.oosHours || ''),
      note: c.note || '',
      color: c.color || '#884444'
    }));
    crewData[project] = copied;
    populateDayModal();

    // Tint the copied fields yellow until save — visual whisper that these came from elsewhere
    setTimeout(function(){
      for (const c of copied) {
        const nm = c.name;
        const reg = document.getElementById('dm-crew-' + nm);
        const oos = document.getElementById('dm-oos-' + nm);
        const nt  = document.getElementById('dm-note-' + nm);
        if (reg && (parseFloat(c.reg || 0) || 0) > 0) reg.classList.add('dc-copied');
        if (oos && (parseFloat(c.oos || 0) || 0) > 0) oos.classList.add('dc-copied');
        if (nt && (c.note || '').trim()) nt.classList.add('dc-copied');
      }
      // Clear the tint on any manual edit
      document.querySelectorAll('#dm-crew-section input').forEach(function(el){
        el.addEventListener('input', function(){ el.classList.remove('dc-copied'); });
      });
    }, 30);

    // Toast-style hint
    const bar = document.getElementById('dm-proj-bar');
    if (bar) {
      const hint = document.createElement('div');
      hint.className = 'dc-note';
      hint.textContent = 'Copied from ' + fmtDate(src.date) + ' \u2014 review, tweak, save.';
      hint.style.cssText = 'font-size:10px;color:#c8a020;margin:4px 0 0 0';
      const existing = bar.parentNode.querySelector('.dc-hint');
      if (existing) existing.remove();
      hint.classList.add('dc-hint');
      bar.parentNode.insertBefore(hint, bar.nextSibling);
      setTimeout(function(){ hint.remove(); }, 4000);
    }
  };

  // Inject the button once per modal open, right under the project chips
  const _origPop = window.populateDayModal;
  if (typeof _origPop === 'function') {
    window.populateDayModal = function(){
      _origPop();
      if (!dayModalState) return;
      const holder = document.getElementById('dm-crew-section');
      if (!holder) return;
      if (holder.previousElementSibling && holder.previousElementSibling.classList &&
          holder.previousElementSibling.classList.contains('dc-btn-wrap')) {
        holder.previousElementSibling.remove();
      }
      const { date, project } = dayModalState;
      const src = findLastWorkday(project, date);
      const btn = document.createElement('div');
      btn.className = 'dc-btn-wrap';
      const label = src
        ? '\u{1F4CB} Copy from ' + fmtDate(src.date) + ' (last workday)'
        : '\u{1F4CB} Copy last workday';
      btn.innerHTML = '<button class="dc-btn" onclick="dcCopyLastWorkday()"' + (src ? '' : ' disabled title="No prior workday found for this project"') + '>' + label + '</button>';
      holder.parentNode.insertBefore(btn, holder);
    };
  }

  // Save clears the yellow tint (fields are now "real")
  const _origSave = window.saveDayModal;
  if (typeof _origSave === 'function') {
    window.saveDayModal = async function(){
      document.querySelectorAll('.dc-copied').forEach(function(el){ el.classList.remove('dc-copied'); });
      return _origSave.apply(this, arguments);
    };
  }
})();
</script>
<!-- ══ NO-WORK TOGGLE v2 — replaces NO-WORK LABEL v1. Find and delete the old "NO-WORK LABEL v1" block, then paste this in its place. ══ -->
<script>
(function(){
  if (typeof window.noWorkCrew !== 'function') return;
  window.noWorkCrew = function(worker){
    const hEl = document.getElementById('dm-crew-' + worker);
    const oEl = document.getElementById('dm-oos-' + worker);
    const nEl = document.getElementById('dm-note-' + worker);
    const cEl = document.getElementById('dm-color-' + worker);
    const btn = document.getElementById('dm-nw-' + worker);

    // Toggle: if the note is already X (or the legacy NO WORK), clear it
    const cur = nEl ? (nEl.value || '').trim() : '';
    const isOn = (cur === 'X' || cur === 'NO WORK');

    if (isOn) {
      if (nEl) { nEl.value = ''; nEl.style.color = ''; nEl.style.fontWeight = ''; }
      if (cEl) cEl.value = '#884444';
      if (btn) { btn.style.background = '#2a1515'; btn.style.borderColor = '#cc3333'; btn.style.color = '#cc8888'; }
      return;
    }

    // Turn on: mark as no-work with X
    if (hEl) hEl.value = '0';
    if (oEl) oEl.value = '0';
    if (nEl) { nEl.value = 'X'; nEl.style.color = '#cc3333'; nEl.style.fontWeight = 'bold'; }
    if (cEl) cEl.value = '#cc3333';
    if (btn) { btn.style.background = '#5a1515'; btn.style.borderColor = '#ff4444'; btn.style.color = '#ff6666'; }
    const strip = btn && btn.nextElementSibling;
    if (strip) [...strip.children].forEach(function(s){ s.style.outline = 'none'; });
  };
})();
</script>
<!-- ══ DAY PICKER FILTER v2 — Active-only picker + rich "+ New" hub. Replaces DAY PICKER FILTER v1. Delete the old "DAY PICKER FILTER v1" block, then paste this in its place. ══ -->
<script>
(function(){
  if (typeof window.populateDayModal !== 'function' || typeof window.addNewProjectToDay !== 'function') return;

  // ── Styles for the picker modal ──
  const st = document.createElement('style');
  st.textContent = ''
    + '#dpm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9200;align-items:center;justify-content:center}'
    + '#dpm-box{background:var(--panel,#16213e);border:2px solid var(--accent,#e8a020);border-radius:12px;width:min(520px,94vw);max-height:82vh;overflow:hidden;display:flex;flex-direction:column}'
    + '#dpm-head{padding:12px 16px;background:#0f3460;font-weight:bold;display:flex;justify-content:space-between;align-items:center}'
    + '#dpm-close{background:none;border:none;color:#aab;font-size:16px;cursor:pointer}'
    + '#dpm-close:hover{color:#fff}'
    + '#dpm-body{padding:14px 16px;overflow-y:auto;flex:1}'
    + '.dpm-label{font-size:10px;color:#88a;letter-spacing:.06em;text-transform:uppercase;margin:2px 0 8px}'
    + '#dpm-new{display:flex;gap:6px;margin-bottom:14px}'
    + '#dpm-new input{flex:1;background:#0f1a2e;border:1px solid #2a3a5e;color:#dde;border-radius:6px;padding:7px 10px;font-size:13px}'
    + '#dpm-new button{background:var(--accent,#e8a020);color:#111;border:none;border-radius:6px;padding:7px 14px;font-weight:bold;cursor:pointer}'
    + '.dpm-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}'
    + '.dpm-chip{background:#243a5e;color:#cde;border:1px solid #2a4a7e;border-radius:15px;padding:5px 11px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}'
    + '.dpm-chip:hover{border-color:var(--accent,#e8a020);color:#fff}'
    + '.dpm-chip-tag{font-size:9px;background:rgba(0,0,0,.3);border-radius:3px;padding:1px 4px;color:#889}'
    + '.dpm-empty{font-size:11px;color:#667;font-style:italic}';
  document.head.appendChild(st);

  function activeStatus(name){
    const p = (data.projects || []).find(x => (x.name || '') === name);
    if (!p) return null; // unknown / never-saved as a project record
    return p.status && p.status.trim() ? p.status : null; // treat blank/unset as "not active"
  }
  function isVisibleStatus(s){ return s === 'Active'; } // strict: only Active
  function isPickerHidden(name, date){
    const s = activeStatus(name);
    if (s && isVisibleStatus(s)) return false;
    // Never hide when the day itself has a real entry for that project
    return !(data.entries || []).some(e => e && e.date === date && (e.project || '') === name);
  }

  // ── Filter the picker list ──
  const _origPop = window.populateDayModal;
  window.populateDayModal = function(){
    if (!dayModalState) return _origPop.apply(this, arguments);
    const { date, projects } = dayModalState;
    const filtered = projects.filter(name => !isPickerHidden(name, date));
    if (filtered.length && !filtered.includes(dayModalState.project)) dayModalState.project = filtered[0];
    const orig = dayModalState.projects;
    dayModalState.projects = filtered;
    try { _origPop.apply(this, arguments); }
    finally { dayModalState.projects = orig; }
  };

  // ── Overlay setup ──
  function ensureOverlay(){
    if (document.getElementById('dpm-overlay')) return;
    const ov = document.createElement('div');
    ov.id = 'dpm-overlay';
    ov.innerHTML = '<div id="dpm-box">'
      + '<div id="dpm-head"><span>Add a project to this day</span><button id="dpm-close" title="Close">\u2715</button></div>'
      + '<div id="dpm-body">'
      +   '<div class="dpm-label">Create a new project</div>'
      +   '<div id="dpm-new"><input type="text" id="dpm-new-name" placeholder="New project name..."><button id="dpm-new-btn">Create</button></div>'
      +   '<div class="dpm-label">Or bring one back to today\u2019s picker</div>'
      +   '<div id="dpm-chips" class="dpm-chips"></div>'
      + '</div>'
      + '</div>';
    document.body.appendChild(ov);
    ov.addEventListener('click', e => { if (e.target === ov) closePicker(); });
    document.getElementById('dpm-close').addEventListener('click', closePicker);
    document.getElementById('dpm-new-btn').addEventListener('click', createNew);
    document.getElementById('dpm-new-name').addEventListener('keydown', e => { if (e.key === 'Enter') createNew(); });
  }

  function closePicker(){
    const ov = document.getElementById('dpm-overlay');
    if (ov) ov.style.display = 'none';
  }

  function bringBack(name){
    const p = (data.projects || []).find(x => (x.name || '') === name);
    if (p) p.status = 'Active';   // sets unset / Complete / On Hold / Bidding \u2192 Active
    if (!dayModalState.projects.includes(name)) {
      dayModalState.projects.push(name);
      if (!dayModalState.crewData[name]) dayModalState.crewData[name] = [];
    }
    flushCrewToState();
    dayModalState.project = name;
    closePicker();
    try { saveAll(); } catch (e) {}
    populateDayModal();
  }

  function createNew(){
    const raw = document.getElementById('dpm-new-name').value.trim();
    if (!raw) return;
    if (!dayModalState.projects.includes(raw)) {
      dayModalState.projects.push(raw);
      if (!dayModalState.crewData[raw]) dayModalState.crewData[raw] = [];
    }
    // Register the project so its status defaults to Active (won't be hidden next time)
    if (!(data.projects || []).some(p => (p.name || '') === raw)) {
      data.projects = data.projects || [];
      data.projects.push({ name: raw, status: 'Active' });
    } else {
      const p = data.projects.find(p => (p.name || '') === raw);
      if (p) p.status = 'Active';
    }
    flushCrewToState();
    dayModalState.project = raw;
    closePicker();
    try { saveAll(); } catch (e) {}
    populateDayModal();
  }

  window.addNewProjectToDay = function(){
    ensureOverlay();
    if (!dayModalState) return;
    const date = dayModalState.date;
    const visibleSet = new Set(dayModalState.projects.filter(n => !isPickerHidden(n, date)));
    // Hidden = every known project not currently visible in this picker
    const hidden = (data.projects || [])
      .map(p => p.name || '')
      .filter(n => n && !visibleSet.has(n))
      .sort();
    const chipsWrap = document.getElementById('dpm-chips');
    if (!hidden.length) {
      chipsWrap.innerHTML = '<div class="dpm-empty">No hidden projects \u2014 everything is already in your picker.</div>';
    } else {
      chipsWrap.innerHTML = hidden.map(n => {
        const s = activeStatus(n);
        const tag = s ? s : 'unset';
        const jsN = String(n).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return '<span class="dpm-chip" onclick="dpmBringBack(\'' + jsN + '\')">' + esc(n) + '<span class="dpm-chip-tag">' + tag + '</span></span>';
      }).join('');
    }
    document.getElementById('dpm-new-name').value = '';
    document.getElementById('dpm-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('dpm-new-name').focus(), 50);
  };

  window.dpmBringBack = bringBack;
})();
</script>
<!-- ══ ADD-MATERIAL REDIRECT v1 — "+ Add Material" now opens Materials History for the right project, focus on the add row. Paste above </body>, after all other snippets. ══ -->
<script>
(function(){
  if (typeof window.openMatHistory !== 'function') return;

  // Intercept clicks on any "+ Add Material" button, panels or floaters
  document.addEventListener('click', function(e){
    const btn = e.target && e.target.closest ? e.target.closest('.mat-add-btn') : null;
    if (!btn) return;
    const label = (btn.textContent || '').trim();
    if (!/Add Material/i.test(label)) return;
    // Find the job panel this button belongs to and pull the project name off it
    const panel = btn.closest('.job-panel');
    const proj = panel && panel.dataset ? panel.dataset.proj : null;
    if (!proj) return;
    e.preventDefault();
    e.stopPropagation();
    openMatHistory(proj);
    // Focus the description field so they're ready to type
    setTimeout(function(){
      const desc = document.getElementById('mh-a-desc');
      if (desc) desc.focus();
    }, 60);
  }, true);
})();
</script>
</body>
