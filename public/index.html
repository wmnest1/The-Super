    + '</div></div>';
  flagsWrap.parentNode.insertBefore(wrap, flagsWrap);

  function nowHM(){ var d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
  function escA(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
  function mapsLink(a){ return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(a); }
  function toDisplay(t){
    var p = t.split(':');
    var h = parseInt(p[0], 10);
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + p[1] + ' ' + ampm;
  }
  function localISO(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

      time: time,
      time_display: toDisplay(time),

      address: document.getElementById('appt-f-addr').value.trim(),
      notes: document.getElementById('appt-f-notes').value.trim()
    };

      await fetch('/api/appointments', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      document.getElementById('appt-f-time').value='';
      document.getElementById('appt-f-person').value='';
      document.getElementById('appt-f-addr').value='';
      document.getElementById('appt-f-notes').value='';
      document.getElementById('appt-form').style.display='none';
      apptLoad();
    } catch(e){ alert('Save failed'); }
  };

  window.apptDel = async function(id){
    if (!confirm('Cancel this appointment?')) return;
    try { await fetch('/api/appointments/' + id, { method:'DELETE' }); } catch(e) {}
    apptLoad();
  };

  async function apptLoad(){
    try {
      var r = await fetch('/api/appointments/today');
      var d = await r.json();
      var appts = d.appointments || [];
      var now = nowHM();
      document.getElementById('appt-count').textContent = appts.length ? (appts.length + ' today') : '';
      document.getElementById('appt-list').innerHTML = appts.length
        ? appts.map(function(a){
            var past = a.time < now;
            return '<div class="appt-item' + (past ? ' past' : '') + '">'
              + '<span class="appt-t">' + escA(a.time_display) + '</span>'
              + '<span style="font-weight:bold">' + escA(a.person || '') + '</span>'
              + (a.address ? '<a class="appt-a" target="_blank" href="' + mapsLink(a.address) + '">' + escA(a.address) + '</a>' : '')
              + (a.notes ? '<span style="color:#667;font-size:12px;font-style:italic">' + escA(a.notes) + '</span>' : '')
              + '<button class="appt-x" onclick="apptDel(\'' + a.id + '\')">✕</button>'
              + '</div>';
          }).join('')
        : '<div style="color:#667;font-size:12px;padding:4px 0">No appointments today — add one below or tell The Super in chat.</div>';
    } catch(e) {
      document.getElementById('appt-list').innerHTML = '<div style="color:#886;font-size:12px">Could not load appointments.</div>';
    }
  }

  apptLoad();
  setInterval(apptLoad, 60000);
  window.addEventListener('focus', apptLoad);
})();
</script>

<!-- ══ KEYBOARD NAV v2 — calendar arrows + modal arrows + Enter to save ══ -->
<script>
(function(){
  // ─────────── PART 1: Calendar day-to-day navigation ───────────
  var st = document.createElement('style');
  st.textContent = '.cal-cell.kb-selected{outline:3px solid var(--accent);outline-offset:-3px;background:#1e2e4e!important}'
    + 'html.light .cal-cell.kb-selected{background:#fff8ee!important}';
  document.head.appendChild(st);

  var kbSel = null; // ISO date string of the selected day

  function isoAdd(iso, days){
    var p = iso.split('-').map(Number);
    var d = new Date(p[0], p[1]-1, p[2] + days);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function cellFor(iso){
    var cells = document.querySelectorAll('#cal-wrap .cal-cell[onclick]');
    for (var i=0;i<cells.length;i++){
      if ((cells[i].getAttribute('onclick')||'').indexOf("'"+iso+"'") !== -1) return cells[i];
    }
    return null;
  }
  function applySel(){
    document.querySelectorAll('.cal-cell.kb-selected').forEach(function(c){ c.classList.remove('kb-selected'); });
    if (!kbSel) return;
    var c = cellFor(kbSel);
    if (c){ c.classList.add('kb-selected'); c.scrollIntoView({block:'nearest'}); }
  }

  // Re-apply the ring every time the calendar re-renders
  if (typeof renderCalendar === 'function'){
    var _origRenderCal = renderCalendar;
    renderCalendar = function(){ _origRenderCal(); applySel(); };
  }

  function moveSel(days){
    if (!kbSel){
      // Start at today if it's on screen, else the 1st of the displayed month
      var startIso = (typeof today!=='undefined') ? today : null;
      var dispFirst = displayYear+'-'+String(displayMonth+1).padStart(2,'0')+'-01';
      kbSel = (startIso && cellFor(startIso)) ? startIso : dispFirst;
      applySel();
      return;
    }
    kbSel = isoAdd(kbSel, days);
    var p = kbSel.split('-').map(Number);
    // Rolled off the displayed month? Flip the calendar to follow.
    if (p[0] !== displayYear || (p[1]-1) !== displayMonth){
      if (days > 0) nextMonth(); else prevMonth();
    }
    applySel();
  }

  function typingSomewhere(){
    var a = document.activeElement;
    return a && (a.tagName==='INPUT' || a.tagName==='TEXTAREA' || a.tagName==='SELECT' || a.isContentEditable);
  }
  function anyModalOpen(){
    var dm=document.getElementById('day-modal'), wm=document.getElementById('week-modal'), mp=document.getElementById('mat-panel');
    return (dm&&dm.classList.contains('open'))||(wm&&wm.classList.contains('open'))||(mp&&mp.classList.contains('open'));
  }

  // Clicking a day also moves the selection there
  var calWrap = document.getElementById('cal-wrap');
  if (calWrap) calWrap.addEventListener('click', function(e){
    var cell = e.target.closest('.cal-cell[onclick]');
    if (!cell) return;
    var m = (cell.getAttribute('onclick')||'').match(/'(\d{4}-\d{2}-\d{2})'/);
    if (m){ kbSel = m[1]; }
  });

  document.addEventListener('keydown', function(e){
    // ── Calendar navigation: only when nothing else wants the keys ──
    if (!anyModalOpen() && !typingSomewhere()){
      if (e.key==='ArrowLeft'){ e.preventDefault(); moveSel(-1); return; }
      if (e.key==='ArrowRight'){ e.preventDefault(); moveSel(1); return; }
      if (e.key==='ArrowUp'){ e.preventDefault(); moveSel(-7); return; }
      if (e.key==='ArrowDown'){ e.preventDefault(); moveSel(7); return; }
      if (e.key==='Enter' && kbSel && cellFor(kbSel)){ e.preventDefault(); openDayModal(kbSel); return; }
      if (e.key==='Escape' && kbSel){ kbSel=null; applySel(); return; }
      if (e.key==='PageUp'){ e.preventDefault(); prevMonth(); return; }
      if (e.key==='PageDown'){ e.preventDefault(); nextMonth(); return; }
      if (e.key==='Home'){
        e.preventDefault();
        var now = new Date();
        if (displayYear!==now.getFullYear() || displayMonth!==now.getMonth()){
          displayYear=now.getFullYear(); displayMonth=now.getMonth(); render();
        }
        if (typeof today!=='undefined'){ kbSel = today; applySel(); }
        return;
      }
    }

    // ─────────── PART 2: Inside the day/week modals ───────────
    var t = e.target;
    if (!t) return;
    var dm = document.getElementById('day-modal');
    var wm = document.getElementById('week-modal');
    var dayOpen = dm && dm.classList.contains('open');
    var weekOpen = wm && wm.classList.contains('open');
    if (!dayOpen && !weekOpen) return;

    // Enter = Save All (except in the notes textarea / on buttons)
    if (e.key==='Enter'){
      if (t.tagName==='TEXTAREA' || t.tagName==='BUTTON') return;
      e.preventDefault();
      if (dayOpen && typeof saveDayModal==='function') saveDayModal();
      else if (weekOpen && typeof saveWeekModal==='function') saveWeekModal();
      return;
    }
    if (e.key!=='ArrowDown' && e.key!=='ArrowUp') return;

    // Day modal: ↓/↑ between workers in the same column
    var COLS = ['dm-crew-','dm-oos-','dm-note-'];
    if (dayOpen && t.id){
      for (var c=0;c<COLS.length;c++){
        if (t.id.indexOf(COLS[c])===0){
          var worker = t.id.slice(COLS[c].length);
          var crew = (typeof CREW_ORDER!=='undefined') ? CREW_ORDER : [];
          var r = crew.indexOf(worker);
          if (r<0) return;
          e.preventDefault();
          r += (e.key==='ArrowDown'?1:-1);
          if (r<0) r = crew.length-1;
          if (r>=crew.length) r = 0;
          var el = document.getElementById(COLS[c]+crew[r]);
          if (el){ el.focus(); if (el.select) try{ el.select(); }catch(x){} }
          return;
        }
      }
    }
    // Week modal: ↓/↑ between day inputs
    if (weekOpen && t.id && t.id.indexOf('wm-day-')===0){
      var ins = Array.prototype.slice.call(document.querySelectorAll('#week-modal input[id^="wm-day-"]:not([disabled])'));
      var i = ins.indexOf(t);
      if (i<0) return;
      e.preventDefault();
      var next = i + (e.key==='ArrowDown'?1:-1);
      if (next<0) next = ins.length-1;
      if (next>=ins.length) next = 0;
      ins[next].focus();
      if (ins[next].select) try{ ins[next].select(); }catch(x2){}
    }
  }, true);

  // Select-all on focus for quick overwrite
  document.addEventListener('focusin', function(e){
    var t = e.target;
    if (!t || !t.id) return;
    var quick = t.id.indexOf('dm-crew-')===0 || t.id.indexOf('dm-oos-')===0 || t.id.indexOf('wm-day-')===0;
    if (quick && t.select) try{ t.select(); }catch(err){}
  });
})();
</script>

  +'.stage-row input,.stage-row select{background:#0f1a2e;border:1px solid #2a3a5e;border-radius:5px;color:var(--text);padding:4px 6px;font-size:11px;width:100%}'
  +'.stage-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent)}'
  +'.stage-row.dup{opacity:.55}'
  +'.dup-tag{font-size:9px;color:#e8a020;font-weight:bold}'
  +'.stage-ftr{padding:12px 18px;border-top:1px solid #2a3a5e;display:flex;gap:10px;justify-content:flex-end;align-items:center}'
  +'.stage-btn{border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:bold;cursor:pointer}'

  +'.stage-btn.no{background:#1a3060;color:#aac;border:1px solid #2a3a5e}'
  +'#mat-colorpop{position:fixed;z-index:9999;background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:8px;display:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}'
  +'#mat-colorpop .cp-sw{display:inline-block;width:20px;height:20px;border-radius:4px;cursor:pointer;margin:2px;border:1px solid rgba(255,255,255,.25);vertical-align:middle}'
  +'#mat-colorpop .cp-reset{display:block;margin-top:6px;font-size:11px;color:#8ac;cursor:pointer;text-align:center}'
  +'#mat-colorpop .cp-reset:hover{color:#fff}'
  +'html.light #mat-qa{background:#fff;border-color:#dde}'
  +'html.light #mat-qa input,html.light #mat-qa select{background:#f8f8f8;border-color:#ccc;color:#111}'
  +'html.light .stage-box{background:#fff}'
  +'html.light .stage-row input,html.light .stage-row select{background:#f8f8f8;border-color:#ccc;color:#111}';
  document.head.appendChild(st);

  // ── PART 1: Colors — inherit from project, allow per-panel override ──
  window.getMatColor = function(proj, colorMap){
    if (typeof data !== 'undefined' && data.matColors && data.matColors[proj]) return data.matColors[proj];
    if (proj === '__general__') return '#445566';
    if (typeof jobColor === 'function') return jobColor(proj);
    return '#1a5fa8';
  };

  var pop = document.createElement('div');
  pop.id = 'mat-colorpop';
  document.body.appendChild(pop);
  var popProj = null;

  function openColorPop(proj, x, y){
    popProj = proj;
    var pal = (typeof appPalette!=='undefined') ? appPalette : ['#cc4444','#e8720c','#e8c020','#2a9a2a','#1a8a8a','#1a5fa8','#6b2fbe','#b02080'];
    pop.innerHTML = pal.map(function(c){
      return '<span class="cp-sw" style="background:'+c+'" data-c="'+c+'"></span>';
    }).join('') + '<span class="cp-reset">↺ Reset to project color</span>';
    pop.style.left = Math.min(x, window.innerWidth-200)+'px';
    pop.style.top = Math.min(y, window.innerHeight-120)+'px';
    pop.style.display = 'block';
  }
  pop.addEventListener('click', async function(e){
    if (!popProj) return;
    if (typeof data === 'undefined') return;
    if (!data.matColors) data.matColors = {};
    if (e.target.classList.contains('cp-sw')){
      data.matColors[popProj] = e.target.getAttribute('data-c');
    } else if (e.target.classList.contains('cp-reset')){
      delete data.matColors[popProj];
    } else return;
    pop.style.display = 'none';
    await saveAll();
    renderMatList();
  });
  document.addEventListener('click', function(e){
    if (pop.style.display==='block' && !pop.contains(e.target) && !e.target.classList.contains('mat-badge')) pop.style.display='none';
  });
  // Click a project badge in the list → color picker
  var matListEl = document.getElementById('mat-list');
  if (matListEl) matListEl.addEventListener('click', function(e){
    var b = e.target.closest('.mat-badge');
    if (!b) return;
    var row = b.closest('.mat-row');
    if (!row) return;
    var mid = parseInt((row.id||'').replace('matrow-',''),10);
    var m = (typeof matData!=='undefined') ? matData[mid] : null;
    if (!m) return;
    e.stopPropagation();
    openColorPop(m.project, e.clientX, e.clientY);
  });

  // ── PART 2: Quick-add row ──
  var panel = document.getElementById('mat-panel');
  var fbar = panel ? panel.querySelector('.mat-fbar') : null;
  if (!panel || !fbar) return;
  panel.style.position = 'relative';

  var qa = document.createElement('div');
  qa.id = 'mat-qa';
  qa.innerHTML = '<strong style="color:var(--accent);font-size:12px;white-space:nowrap">+ Log purchase</strong>'
    + '<select id="qa-proj" style="min-width:120px"></select>'
    + '<select id="qa-cat" style="display:none;min-width:100px">'+EXP_CATS.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select>'
    + '<input type="date" id="qa-date">'
    + '<input type="text" id="qa-store" placeholder="Store" style="width:100px">'
    + '<input type="text" id="qa-desc" placeholder="Description / location / Txn#" style="flex:1;min-width:140px">'
    + '<input type="number" id="qa-amt" placeholder="$0.00" step="0.01" min="0" style="width:85px">'
    + '<input type="text" id="qa-inv" placeholder="Invoice#" style="width:90px">'
    + '<button class="qa-add" onclick="matQuickAdd()">➕ Add</button>'
    + '<span id="mat-qa-hint">or drag / paste a receipt screenshot here 📷</span>';
  fbar.parentNode.insertBefore(qa, fbar.nextSibling);

  function fillQaProjects(){
    var sel = document.getElementById('qa-proj');
    var cur = sel.value;
    var projs = (typeof matProjects!=='undefined' && matProjects.length) ? matProjects
      : (typeof data!=='undefined' ? (data.projects||[]).map(function(p){return p.name;}) : []);
    sel.innerHTML = projs.map(function(p){return '<option value="'+p.replace(/"/g,'&quot;')+'">'+p+'</option>';}).join('')
      + '<option value="__general__">⬛ General Expense</option>';
    var last = localStorage.getItem('matQaLast');
    if (last){ try{ last=JSON.parse(last); if(last.proj) sel.value=last.proj; if(last.store) document.getElementById('qa-store').value=last.store; }catch(e){} }
    if (cur) sel.value = cur;
    toggleCat();
  }
  function toggleCat(){
    document.getElementById('qa-cat').style.display = document.getElementById('qa-proj').value==='__general__' ? '' : 'none';
  }
  document.getElementById('qa-proj').addEventListener('change', toggleCat);
  document.getElementById('qa-date').value = (typeof today!=='undefined') ? today : new Date().toISOString().slice(0,10);

  // repopulate project list every time the panel opens
  var _origOpenMat = window.openMaterials;
  window.openMaterials = async function(){
    await _origOpenMat();
    fillQaProjects();
  };

  window.matQuickAdd = async function(){
    var proj = document.getElementById('qa-proj').value;
    var isGen = proj === '__general__';
    var item = {
      isGeneral: isGen,
      project: proj,
      category: isGen ? document.getElementById('qa-cat').value : undefined,
      date: document.getElementById('qa-date').value,
      store: document.getElementById('qa-store').value.trim(),
      description: document.getElementById('qa-desc').value.trim(),
      amount: parseFloat(document.getElementById('qa-amt').value || 0),
      invoiceNum: document.getElementById('qa-inv').value.trim()
    };
    if (!item.amount && !item.description){ alert('Enter at least a description or amount'); return; }
    // duplicate check
    var dup = (typeof matData!=='undefined') && matData.some(function(m){
      if (item.invoiceNum && m.invoiceNum && m.invoiceNum === item.invoiceNum) return true;
      return m.date===item.date && Math.abs(parseFloat(m.amount||0)-item.amount)<0.005 && (m.store||'').toLowerCase()===(item.store||'').toLowerCase() && item.amount>0;
    });
    if (dup && !confirm('⚠️ This looks like a duplicate of an existing entry (same invoice# or same date/store/amount). Add anyway?')) return;
    try {
      var r = await fetch('/api/materials/add-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:[item]})});
      var d = await r.json();
      if (!d.ok) throw new Error(d.error||'Add failed');
      localStorage.setItem('matQaLast', JSON.stringify({proj:proj, store:item.store}));
      document.getElementById('qa-desc').value='';
      document.getElementById('qa-amt').value='';
      document.getElementById('qa-inv').value='';
      await loadMaterials();
      fillQaProjects();
      document.getElementById('qa-desc').focus();
    } catch(e){ alert('Add failed: '+e.message); }
  };
  qa.addEventListener('keydown', function(e){
    if (e.key==='Enter' && e.target.tagName==='INPUT'){ e.preventDefault(); matQuickAdd(); }
  });

  // ── PART 3: Screenshot → parse → staging table ──
  var stage = document.createElement('div');
  stage.id = 'mat-stage';
  panel.appendChild(stage);
  var stagedRows = [];

  function compressImage(file, cb){
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var MAX=2000, w=img.width, h=img.height;
        if (w>MAX||h>MAX){ var r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        cb(cv.toDataURL('image/jpeg',.85).split(',')[1]);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function parseScreenshot(file){
    stage.classList.add('open');
    stage.innerHTML = '<div class="stage-box"><div class="stage-hdr"><h3>🤖 Reading screenshot…</h3></div><div class="stage-body" style="display:flex;align-items:center;justify-content:center;color:#778;font-size:14px">Extracting purchases — a few seconds…</div></div>';
    compressImage(file, async function(b64){
      try {
        var r = await fetch('/api/materials/parse-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageData:b64,imageType:'image/jpeg'})});
        var d = await r.json();
        if (!d.ok) throw new Error(d.error||'Parse failed');
        if (!d.rows.length) throw new Error('No purchases found in that screenshot');
        stagedRows = d.rows.map(function(row){
          var isDup = (typeof matData!=='undefined') && matData.some(function(m){
            if (row.invoiceNum && m.invoiceNum && m.invoiceNum===row.invoiceNum) return true;
            return row.date && m.date===row.date && Math.abs(parseFloat(m.amount||0)-row.amount)<0.005 && row.amount>0;
          });
          return { checked:!isDup, dup:isDup, project:'Unsorted Materials',
            date: row.date || ((typeof today!=='undefined')?today:new Date().toISOString().slice(0,10)),
            store: row.store||'', description: row.description||'', amount: row.amount||0, invoiceNum: row.invoiceNum||'' };
        });
        renderStage();
      } catch(e){
        stage.innerHTML = '<div class="stage-box"><div class="stage-hdr"><h3>⚠️ '+e.message+'</h3></div><div class="stage-ftr"><button class="stage-btn no" onclick="document.getElementById(\'mat-stage\').classList.remove(\'open\')">Close</button></div></div>';
      }
    });
  }

  function renderStage(){
    var projs = (typeof matProjects!=='undefined'&&matProjects.length) ? matProjects.slice() : [];
    if (projs.indexOf('Unsorted Materials')===-1) projs.push('Unsorted Materials');
    var opts = projs.map(function(p){return '<option value="'+p.replace(/"/g,'&quot;')+'">'+p+'</option>';}).join('')+'<option value="__general__">⬛ General</option>';
    var rowsHtml = stagedRows.map(function(r,i){
      return '<div class="stage-row'+(r.dup?' dup':'')+'">'
        +'<input type="checkbox" '+(r.checked?'checked':'')+' onchange="stagedRows['+i+'].checked=this.checked">'
        +'<span><select onchange="stagedRows['+i+'].project=this.value" data-v="'+r.project+'">'+opts+'</select>'+(r.dup?'<span class="dup-tag">possible dup</span>':'')+'</span>'
        +'<input type="date" value="'+r.date+'" onchange="stagedRows['+i+'].date=this.value">'
        +'<input type="text" value="'+(r.store||'').replace(/"/g,'&quot;')+'" onchange="stagedRows['+i+'].store=this.value">'
        +'<input type="text" value="'+(r.description||'').replace(/"/g,'&quot;')+'" onchange="stagedRows['+i+'].description=this.value">'
        +'<input type="number" step="0.01" value="'+r.amount+'" onchange="stagedRows['+i+'].amount=parseFloat(this.value)||0">'
        +'<input type="text" value="'+(r.invoiceNum||'').replace(/"/g,'&quot;')+'" onchange="stagedRows['+i+'].invoiceNum=this.value">'
        +'</div>';
    }).join('');
    stage.innerHTML = '<div class="stage-box">'
      +'<div class="stage-hdr"><h3>📷 Found '+stagedRows.length+' purchases — review, fix, uncheck any bad ones</h3>'
      +'<span style="font-size:11px;color:#778">grayed rows look like duplicates of entries already logged</span></div>'
      +'<div class="stage-body">'
      +'<div class="stage-row hdr"><span></span><span>Project</span><span>Date</span><span>Store</span><span>Description</span><span>Amount</span><span>Invoice#</span></div>'
      + rowsHtml
      +'</div>'
      +'<div class="stage-ftr">'
      +'<span id="stage-status" style="font-size:12px;color:#8c8;margin-right:auto"></span>'
      +'<button class="stage-btn no" onclick="document.getElementById(\'mat-stage\').classList.remove(\'open\')">Cancel</button>'
      +'<button class="stage-btn go" onclick="stageCommit()">✅ Add checked items</button>'
      +'</div></div>';
    // set select values (can't via value attr in innerHTML reliably)
    stage.querySelectorAll('select[data-v]').forEach(function(s){ s.value = s.getAttribute('data-v'); if(!s.value) s.value='Unsorted Materials'; });
    window.stagedRows = stagedRows;
  }
  window.stagedRows = stagedRows;

  window.stageCommit = async function(){
    var items = stagedRows.filter(function(r){return r.checked;}).map(function(r){
      return { isGeneral: r.project==='__general__', project: r.project, category: 'Other',
        date: r.date, store: r.store, description: r.description, amount: r.amount, invoiceNum: r.invoiceNum };
    });
    if (!items.length){ alert('Nothing checked'); return; }
    var el = document.getElementById('stage-status');
    if (el) el.textContent = 'Adding '+items.length+'…';
    try {
      var r = await fetch('/api/materials/add-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items})});
      var d = await r.json();
      if (!d.ok) throw new Error(d.error||'Add failed');
      stage.classList.remove('open');
      await loadMaterials();
      fillQaProjects();
    } catch(e){ if (el){ el.textContent='Failed: '+e.message; el.style.color='#e88'; } }
  };

  // Drag & drop + paste targets
  ['dragover','dragenter'].forEach(function(ev){
    qa.addEventListener(ev, function(e){ e.preventDefault(); qa.classList.add('dragover'); });
    panel.addEventListener(ev, function(e){ e.preventDefault(); });
  });
  ['dragleave','drop'].forEach(function(ev){ qa.addEventListener(ev, function(){ qa.classList.remove('dragover'); }); });
  function handleDrop(e){
    e.preventDefault();
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f && f.type.indexOf('image/')===0) parseScreenshot(f);
  }
  qa.addEventListener('drop', handleDrop);
  panel.addEventListener('drop', handleDrop);
  document.addEventListener('paste', function(e){
    if (!panel.classList.contains('open')) return;
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i=0;i<items.length;i++){
      if (items[i].type.indexOf('image/')===0){ parseScreenshot(items[i].getAsFile()); e.preventDefault(); return; }
    }
  });

  fillQaProjects();
})();
</script>
<!-- ══ MATERIALS WINDOW MODE — draggable, resizable panel over the dashboard ══ -->
<script>
(function(){
  var panel = document.getElementById('mat-panel');
  if (!panel) return;

  // Fix the positioning bug from the upgrade snippet and convert to a floating window
  var st = document.createElement('style');
  st.textContent = ''
  +'#mat-panel{position:fixed!important;top:auto;left:auto;right:auto;bottom:auto;'
  +'border:2px solid var(--accent);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.6);'
  +'min-width:700px;min-height:400px;overflow:hidden}'
  +'#mat-panel .mat-fbar{cursor:grab;user-select:none}'
  +'#mat-panel .mat-fbar.dragging{cursor:grabbing}'
  +'.mat-rs{position:absolute;z-index:60}'
  +'#mat-rs-se{bottom:0;right:0;width:20px;height:20px;cursor:se-resize}'
  +'#mat-rs-se::after{content:"";position:absolute;bottom:4px;right:4px;width:9px;height:9px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);border-radius:1px;opacity:.7}'
  +'#mat-rs-e{top:40px;right:0;bottom:24px;width:6px;cursor:e-resize}'
  +'#mat-rs-s{bottom:0;left:24px;right:24px;height:6px;cursor:s-resize}'
  +'#mat-rs-w{top:40px;left:0;bottom:24px;width:6px;cursor:w-resize}'
  +'@media(max-width:900px){#mat-panel{min-width:0}}';
  document.head.appendChild(st);

  // Resize handles
  ['se','e','s','w'].forEach(function(d){
    var h = document.createElement('div');
    h.className = 'mat-rs'; h.id = 'mat-rs-'+d;
    panel.appendChild(h);
  });

  var DEFAULT = function(){
    var w = Math.min(Math.max(Math.round(window.innerWidth*0.86), 700), window.innerWidth-24);
    var h = Math.min(Math.max(Math.round(window.innerHeight*0.78), 400), window.innerHeight-90);
    return { left: Math.round((window.innerWidth-w)/2), top: 76, width: w, height: h };
  };
  function loadRect(){
    try { var s = JSON.parse(localStorage.getItem('matWinRect')||'null'); if (s && s.width) return s; } catch(e){}
    return DEFAULT();
  }
  function saveRect(){
    localStorage.setItem('matWinRect', JSON.stringify({
      left: panel.offsetLeft, top: panel.offsetTop, width: panel.offsetWidth, height: panel.offsetHeight
    }));
  }
  function applyRect(r){
    // clamp on-screen
    r.width = Math.min(Math.max(r.width, 700), window.innerWidth);
    r.height = Math.min(Math.max(r.height, 400), window.innerHeight-10);
    r.left = Math.min(Math.max(r.left, 0), Math.max(0, window.innerWidth - r.width));
    r.top  = Math.min(Math.max(r.top, 0), Math.max(0, window.innerHeight - 60));
    panel.style.left = r.left+'px';
    panel.style.top = r.top+'px';
    panel.style.width = r.width+'px';
    panel.style.height = r.height+'px';
  }

  // openMaterials: window placement + DON'T lock the page behind
  var _open = window.openMaterials;
  window.openMaterials = async function(){
    await _open();
    document.body.style.overflow = '';   // dashboard stays scrollable behind
    applyRect(loadRect());
  };

  // ── Drag by the filter bar ──
  var fbar = panel.querySelector('.mat-fbar');
  var drag = null;
  function dStart(cx, cy, target){
    if (target.closest('input,select,button,a,label')) return false;
    drag = { ox: cx - panel.offsetLeft, oy: cy - panel.offsetTop };
    fbar.classList.add('dragging');
    document.body.style.userSelect = 'none';
    return true;
  }
  function dMove(cx, cy){
    if (!drag) return;
    applyRect({ left: cx - drag.ox, top: cy - drag.oy, width: panel.offsetWidth, height: panel.offsetHeight });
  }
  function dEnd(){
    if (!drag) return;
    drag = null;
    fbar.classList.remove('dragging');
    document.body.style.userSelect = '';
    saveRect();
  }
  if (fbar){
    fbar.addEventListener('mousedown', function(e){ if (dStart(e.clientX, e.clientY, e.target)) e.preventDefault(); });
    document.addEventListener('mousemove', function(e){ dMove(e.clientX, e.clientY); });
    document.addEventListener('mouseup', dEnd);
    fbar.addEventListener('touchstart', function(e){ var t=e.touches[0]; if (dStart(t.clientX, t.clientY, e.target)) e.preventDefault(); }, {passive:false});
    document.addEventListener('touchmove', function(e){ if (drag){ var t=e.touches[0]; dMove(t.clientX, t.clientY); e.preventDefault(); } }, {passive:false});
    document.addEventListener('touchend', dEnd);
  }

  // ── Resize from edges/corner ──
  var rs = null;
  function rsStart(e, dir){
    e.preventDefault(); e.stopPropagation();
    rs = { dir: dir, x: e.clientX, y: e.clientY,
      w: panel.offsetWidth, h: panel.offsetHeight, l: panel.offsetLeft, t: panel.offsetTop };
    document.body.style.userSelect = 'none';
  }
  document.addEventListener('mousemove', function(e){
    if (!rs) return;
    var dx = e.clientX - rs.x, dy = e.clientY - rs.y;
    var r = { left: rs.l, top: rs.t, width: rs.w, height: rs.h };
    if (rs.dir.indexOf('e')>-1) r.width = rs.w + dx;
    if (rs.dir.indexOf('s')>-1) r.height = rs.h + dy;
    if (rs.dir.indexOf('w')>-1){ r.width = rs.w - dx; r.left = rs.l + dx; }
    applyRect(r);
  });
  document.addEventListener('mouseup', function(){
    if (!rs) return;
    rs = null;
    document.body.style.userSelect = '';
    saveRect();
  });
  document.getElementById('mat-rs-se').addEventListener('mousedown', function(e){ rsStart(e,'se'); });
  document.getElementById('mat-rs-e').addEventListener('mousedown', function(e){ rsStart(e,'e'); });
  document.getElementById('mat-rs-s').addEventListener('mousedown', function(e){ rsStart(e,'s'); });
  document.getElementById('mat-rs-w').addEventListener('mousedown', function(e){ rsStart(e,'w'); });

  // ── Maximize / restore toggle in the filter bar ──
  var maxed = false, preMax = null;
  var mx = document.createElement('button');
  mx.className = 'hbtn';
  mx.textContent = '⛶';
  mx.title = 'Maximize / restore';
  mx.style.cssText = 'padding:5px 10px;font-size:13px';
  mx.addEventListener('click', function(){
    if (!maxed){
      preMax = { left: panel.offsetLeft, top: panel.offsetTop, width: panel.offsetWidth, height: panel.offsetHeight };
      applyRect({ left: 6, top: 70, width: window.innerWidth-12, height: window.innerHeight-80 });
      maxed = true; mx.textContent = '🗗';
    } else {

      maxed = false; mx.textContent = '⛶';
      saveRect();
    }
  });
  var btnGroup = fbar ? fbar.querySelector('div[style*="margin-left:auto"]') : null;
  if (btnGroup) btnGroup.insertBefore(mx, btnGroup.firstChild);
  else if (fbar) fbar.appendChild(mx);

  // Double-click header = maximize toggle
  if (fbar) fbar.addEventListener('dblclick', function(e){
    if (e.target.closest('input,select,button,a,label')) return;
    mx.click();
  });

  // Keep the window on-screen if the browser resizes
  window.addEventListener('resize', function(){
    if (panel.classList.contains('open')) applyRect({
      left: panel.offsetLeft, top: panel.offsetTop, width: panel.offsetWidth, height: panel.offsetHeight
    });
  });
})();

  +'html.light #qa-billed{background:#effaf0!important;color:#1a7a2a!important}'

  document.head.appendChild(st);

  // ── Date: wrap with hover steppers ──

  steps.children[0].addEventListener('click', function(){ shiftDate(1); });
  steps.children[1].addEventListener('click', function(){ shiftDate(-1); });

  // ── Store: combo box with remembered history, Home Depot default ──
  var storeEl = document.getElementById('qa-store');
  var dl = document.createElement('datalist');
  dl.id = 'qa-stores';
  document.body.appendChild(dl);
  storeEl.setAttribute('list','qa-stores');
  storeEl.setAttribute('placeholder','Store ▾');
  function customStores(){
    try { return JSON.parse(localStorage.getItem('matStores')||'[]'); } catch(e){ return []; }
  }
  function rememberStore(s){
    if (!s) return;
    var list = customStores();
    if (list.map(function(x){return x.toLowerCase();}).indexOf(s.toLowerCase())===-1){
      list.push(s); localStorage.setItem('matStores', JSON.stringify(list.slice(-40)));
    }
  }
  function refreshStoreList(){
    var seen = {};
    var base = ['Home Depot','Pace Supply','Ace Hardware',"Lowe's",'Amazon'];
    var fromData = (typeof matData!=='undefined') ? matData.map(function(m){return (m.store||'').trim();}) : [];
    var all = base.concat(customStores()).concat(fromData).filter(Boolean);
    dl.innerHTML = all.filter(function(s){
      var k=s.toLowerCase(); if(seen[k]) return false; seen[k]=true; return true;
    }).map(function(s){ return '<option value="'+s.replace(/"/g,'&quot;')+'">'; }).join('');
  }

  // ── Type: Material / Sub ──
  var kind = document.createElement('select');

  kind.innerHTML = '<option value="material">📦 Material</option><option value="sub">🔧 Sub</option>';
  var projEl = document.getElementById('qa-proj');

  // ── Markup stepper + billed box ──
  var amtEl = document.getElementById('qa-amt');

  mkwrap.innerHTML = '<button type="button" id="qa-mk-dn">‹</button><input id="qa-mk" value="15">%<button type="button" id="qa-mk-up">›</button>';
  amtEl.parentNode.insertBefore(mkwrap, amtEl.nextSibling);
  var billed = document.createElement('input');
  billed.id = 'qa-billed';
  billed.type = 'text';
  billed.readOnly = true;
  billed.title = 'What the client gets billed (cost + markup)';
  billed.value = 'bills $0.00';
  mkwrap.parentNode.insertBefore(billed, mkwrap.nextSibling);

  var mkEl = document.getElementById('qa-mk');
  function pct(){ var v = parseFloat(mkEl.value); return isNaN(v)?0:Math.max(0,Math.min(100,v)); }
  function paintBilled(){
    var c = parseFloat(amtEl.value||0)||0;
    billed.value = 'bills $' + (c*(1+pct()/100)).toFixed(2);
  }
  function mkDefaults(){
    try { return JSON.parse(localStorage.getItem('matMkDefaults')||'{}'); } catch(e){ return {}; }
  }
  function projMarkup(name){
    if (typeof data==='undefined') return null;
    var p = (data.projects||[]).find(function(x){return (x.name||'')===name;});
    if (p && p.markup!==undefined && p.markup!=='' && !isNaN(parseFloat(p.markup))) return parseFloat(p.markup);
    return null;

  function applyMkDefault(){
    var key = projEl.value+'|'+kind.value;
    var d = mkDefaults();
    if (d[key]!=null) mkEl.value = d[key];
    else {
      var pm = projMarkup(projEl.value);
      mkEl.value = (pm!=null) ? pm : (kind.value==='sub' ? 0 : 15);
    }
    paintBilled();
  }
  document.getElementById('qa-mk-up').addEventListener('click', function(){ mkEl.value = pct()+1; paintBilled(); });
  document.getElementById('qa-mk-dn').addEventListener('click', function(){ mkEl.value = Math.max(0,pct()-1); paintBilled(); });
  mkEl.addEventListener('input', paintBilled);
  amtEl.addEventListener('input', paintBilled);
  projEl.addEventListener('change', applyMkDefault);
  kind.addEventListener('change', applyMkDefault);

  // ── Reset to today + defaults each time the window opens ──
  var _open2 = window.openMaterials;

  // ── Wrap quick-add to include kind + markup, remember store & markup default ──
  var _qadd = window.matQuickAdd;
  window.matQuickAdd = async function(){
    var origFetch = window.fetch;

    window.fetch = function(url, opts){
      if (url === '/api/materials/add-batch' && opts && opts.body){
        try {
          var body = JSON.parse(opts.body);
          if (body.items && body.items.length===1){
            body.items[0].kind = kind.value;
            body.items[0].markupPct = pct();
            opts.body = JSON.stringify(body);
          }
        } catch(e){}
      }
      return origFetch(url, opts);
    };
    try { await _qadd(); } finally { window.fetch = origFetch; }
    var s = storeEl.value.trim();
    if (s){ rememberStore(s); localStorage.setItem('matLastStore', s); }
    var d = mkDefaults(); d[projEl.value+'|'+kind.value] = pct();
    localStorage.setItem('matMkDefaults', JSON.stringify(d));
    refreshStoreList();
    paintBilled();
  };

  // ── SUB badges + billed hints in the list ──
  var _render = window.renderMatList;
  window.renderMatList = function(){
    _render();
    if (typeof matData==='undefined') return;
    document.querySelectorAll('#mat-list .mat-row').forEach(function(row){
      var mid = parseInt((row.id||'').replace('matrow-',''),10);
      var m = matData[mid];
      if (!m) return;
      var desc = row.querySelector('.mat-desc');
      if (m.kind==='sub' && desc && !desc.querySelector('.sub-chip')){
        var chip = document.createElement('span');

      }
    });
  };

  // ── Job panels: honor per-item markup (item % → project % → 15%) ──
  function itemPct(m, projName){
    if (m && m.markupPct!=null && !isNaN(parseFloat(m.markupPct))) return parseFloat(m.markupPct);
    var pm = projMarkup(projName);
    return (pm!=null) ? pm : 15;
  }
  var _panel = window.renderJobPanel;
  window.renderJobPanel = function(proj){
    var html = _panel(proj);
    try {
      // recompute materials figures with per-item markup and patch the numbers in the rendered HTML
      var ent = entriesForProjectMonth(proj, displayYear, displayMonth);
      var allEnt = entriesForProject(proj);
      function calc(list){
        var sub=0, mk=0, subPay=0;
        for (var i=0;i<list.length;i++){
          var mats = list[i].materials||[];
          for (var j=0;j<mats.length;j++){
            var c = parseFloat(mats[j].cost||0)||0;
            sub += c;
            mk += c*(itemPct(mats[j], proj)/100);
            if (mats[j].kind==='sub') subPay += c;
          }
        }
        return {sub:sub, mk:mk, total:sub+mk, subPay:subPay};
      }
      var mo = calc(ent), all = calc(allEnt);
      // month materials block
      html = html.replace(/<div class="mat-total-row"><span class="lbl">15% Markup<\/span><span class="amt">\$[\d,.]+<\/span><\/div>/,
        '<div class="mat-total-row"><span class="lbl">Markup (per item)</span><span class="amt">'+fmt$(mo.mk)+'</span></div>');
      html = html.replace(/(<span class="lbl" style="color:#fff;font-weight:bold">Total Materials<\/span><span class="amt" style="color:var\(--accent\);font-weight:bold">)\$[\d,.]+(<\/span>)/,
        '$1'+fmt$(mo.total)+'$2');
      // all-time totals block
      html = html.replace(/(<span class="lbl">Total Materials \(with markup\)<\/span><span>)\$[\d,.]+(<\/span>)/,
        '$1'+fmt$(all.total)+'$2');
      if (all.subPay>0){
        html = html.replace(/(<div class="tot-row"><span class="lbl">Total Materials \(with markup\)<\/span><span>[^<]+<\/span><\/div>)/,
          '$1<div class="tot-row" style="color:#ffce7a;font-size:12px"><span class="lbl">↳ incl. Sub payments (cost)</span><span>'+fmt$(all.subPay)+'</span></div>');
      }
      // grand total + balance due need recompute: labor(all) + all.total
      var rate = billingRate(proj), oosR = oosRateFor(proj);
      var labor = 0;
      for (var k=0;k<allEnt.length;k++){
        var crew = allEnt[k].crew||[];
        for (var c2=0;c2<crew.length;c2++){
          var cc=crew[c2];
          if (cc.outOfScope) labor += parseFloat(cc.hours||0)*oosR;
          else labor += parseFloat(cc.hours||0)*rate + parseFloat(cc.oosHours||0)*oosR;
        }
      }
      var grand = labor + all.total;
      var paid = (((typeof data!=='undefined'?data.payments:null)||{})[proj]||[]).reduce(function(s,p){return s+parseFloat(p.amount||0);},0);
      var due = grand - paid;
      html = html.replace(/(<div class="tot-row grand"><span class="lbl">GRAND TOTAL<\/span><span>)\$[\d,.]+(<\/span>)/,
        '$1'+fmt$(grand)+'$2');
      html = html.replace(/(<span class="amt (?:paid)?\s?">?)\$[\d,.]+( ?✓?<\/span>)/,'');
      html = html.replace(/<span class="amt ([^"]*)">\$[\d,.]+(\s*✓)?<\/span>/,
        '<span class="amt '+(due<=0?'paid':'')+'">'+fmt$(Math.abs(due))+(due<=0?' ✓':'')+'</span>');
    } catch(e){ /* if patching fails, fall back to original html untouched */ }
    return html;
  };

  refreshStoreList();
  applyMkDefault();
})();
</script>
<!-- ══ MATERIALS FIX v2.1 — clean job-panel math + sub-aware payee box ══ -->
<script>
(function(){
  // markup priority: item % → project markup field → 15%
  window.__itemPct = function(m, projName){
    if (m && m.markupPct!=null && !isNaN(parseFloat(m.markupPct))) return parseFloat(m.markupPct);
    if (typeof data!=='undefined'){
      var p=(data.projects||[]).find(function(x){return (x.name||'')===projName;});
      if (p && p.markup!==undefined && p.markup!=='' && !isNaN(parseFloat(p.markup))) return parseFloat(p.markup);
    }
    return 15;
  };

  // ── Clean rebuild of the job panel renderer (replaces the buggy patched version) ──
  window.renderJobPanel = function(proj){
  const color=jobColor(proj);
  const rate=billingRate(proj);
  const oosR=oosRateFor(proj);
  const ent=entriesForProjectMonth(proj,displayYear,displayMonth);
  const allEnt=entriesForProject(proj);
  const weeks=monthWeeks(displayYear,displayMonth);
  const payments=((data.payments||{})[proj]||[]);
  const projId=proj.replace(/[^a-z0-9]/gi,'_');

  // Crew set
  const crewSet=new Set();
  for(const en of ent)for(const c of(en.crew||[]))crewSet.add(normName(c.name));
  const crew=[...CREW_ORDER.filter(c=>crewSet.has(c)),...[...crewSet].filter(c=>!CREW_ORDER.includes(c))];

  // Weekly hours table
  let wkCols=weeks.map((wk,wi)=>`<th style="cursor:default">Wk ${wk.n}</th>`).join('')+'<th>Total</th><th>Billed</th>';
  let wkRows='';const wkLabor=weeks.map(()=>0);let grandLaborHrs=0;
  const wkOOSHrs=weeks.map(()=>0);
  for(const worker of crew){
    const wkHrs=weeks.map(wk=>workerHours(entriesInWeek(ent,wk.start,wk.end),worker));
    const total=wkHrs.reduce((a,b)=>a+b,0);grandLaborHrs+=total;
    wkHrs.forEach((h,i)=>wkLabor[i]+=h);
    const billed=total*rate;
    wkRows+=`<tr>
      <td>${esc(worker)}</td>
      ${wkHrs.map((h,wi)=>`<td class="hrs-cell${h===0?' zero':''}" onclick="openWeekModal('${esc(proj)}','${esc(worker)}',${wi})" title="Click to edit ${worker} Week ${wi+1}">${h===0?'—':h}</td>`).join('')}
      <td><strong>${total}</strong></td>
      <td>${billed>0?fmt$(billed):'—'}</td>
    </tr>`;
  }
  // Tally OOS hours per week
  weeks.forEach((wk,wi)=>{
    const wkEnt=entriesInWeek(ent,wk.start,wk.end);
    for(const en of wkEnt)for(const c of(en.crew||[])){if(c.outOfScope)wkOOSHrs[wi]+=parseFloat(c.hours||0);else wkOOSHrs[wi]+=parseFloat(c.oosHours||0);}
  });
  const grandOOSHrs=wkOOSHrs.reduce((a,b)=>a+b,0);
  const wkLaborTotals=wkLabor.map(h=>fmt$(h*rate)).join('</td><td>');

  if(grandOOSHrs>0){
    const oosHrCells=wkOOSHrs.map(h=>h>0?h:'—').join('</td><td>');
    const oosLabCells=wkOOSHrs.map(h=>h>0?fmt$(h*oosR):'—').join('</td><td>');
    wkRows+=`<tr class="wk-oos"><td>↳ OOS Hrs</td><td>${oosHrCells}</td><td>${grandOOSHrs}</td><td>—</td></tr>`;
    wkRows+=`<tr class="wk-oos-labor"><td>↳ OOS Labor $</td><td>${oosLabCells}</td><td></td><td>${fmt$(grandOOSHrs*oosR)}</td></tr>`;
  }

  // Materials (from all entries in month, with edit/delete)
  const matItems=[];
  for(const en of ent)for(let mi=0;mi<(en.materials||[]).length;mi++){
    const m=en.materials[mi];if(m.description||m.cost)matItems.push({date:en.date,m,mi});
  }
  const matsSub=matItems.reduce((s,{m})=>s+parseFloat(m.cost||0),0);
  const matsMarkup=matItems.reduce((s,{m})=>s+parseFloat(m.cost||0)*(window.__itemPct(m,proj)/100),0);
  const matsTotal2=matsSub+matsMarkup;
  const monthSubPay=matItems.reduce((s,{m})=>s+(m.kind==='sub'?parseFloat(m.cost||0):0),0);

  let matsRows=matItems.length===0

    <div class="mat-total-row" style="border-top:2px solid #2a3a5e"><span class="lbl" style="color:#fff;font-weight:bold">Total Materials</span><span class="amt" style="color:var(--accent);font-weight:bold">${fmt$(matsTotal2)}</span></div>`;

  const allOOSHrs=allEnt.reduce((t,e)=>t+(e.crew||[]).reduce((s,c)=>s+(c.outOfScope?parseFloat(c.hours||0):parseFloat(c.oosHours||0)),0),0);
  const allOOSLabor=allOOSHrs*oosR;
  const allMatsSub=matsTotal(allEnt);
  let allMatsTotal=0, allSubPay=0;
  for(const en of allEnt)for(const m of(en.materials||[])){
    const c=parseFloat(m.cost||0);
    allMatsTotal+=c*(1+window.__itemPct(m,proj)/100);
    if(m.kind==='sub')allSubPay+=c;
  }
  const grandTotal=allLaborBilled+allMatsTotal;
  const totalPaid=payments.reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const balanceDue=grandTotal-totalPaid;

  // Payments
  const payRows=payments.length===0
    ?'<div style="font-size:12px;color:#444;padding:4px 0">No payments recorded</div>'

        ${allOOSLabor>0?`<div class="tot-row" style="color:#ffe066;font-size:12px"><span class="lbl">↳ incl. Out-of-Scope Labor (${allOOSHrs}hr)</span><span>${fmt$(allOOSLabor)}</span></div>`:''}
        <div class="tot-row"><span class="lbl">Total Materials & Subs (billed)</span><span>${fmt$(allMatsTotal)}</span></div>
        ${allSubPay>0?`<div class="tot-row" style="color:#ffce7a;font-size:12px"><span class="lbl">↳ incl. Sub payments (cost)</span><span>${fmt$(allSubPay)}</span></div>`:''}

            list.push(payee); localStorage.setItem('matSubPayees', JSON.stringify(list.slice(-40)));
          }

      }
    };
    paintKindMode();
  }
})();

<script>
(function(){
  function projField(name, field){
    if (typeof data==='undefined') return null;
    var p = (data.projects||[]).find(function(x){ return (x.name||'')===name; });
    if (p && p[field]!==undefined && p[field]!=='' && !isNaN(parseFloat(p[field]))) return parseFloat(p[field]);
    return null;
  }

  // ── markup priority, sub-aware ──
  //   materials: item % → project "markup"    → 15
  //   subs:      item % → project "subMarkup" → 0
  window.__itemPct = function(m, projName){
    if (m && m.markupPct!=null && !isNaN(parseFloat(m.markupPct))) return parseFloat(m.markupPct);
    if (m && m.kind==='sub'){
      var s = projField(projName, 'subMarkup');
      return (s!=null) ? s : 0;
    }
    var pm = projField(projName, 'markup');
    return (pm!=null) ? pm : 15;
  };

  // ── quick-add stepper default, same chain (your remembered % still wins) ──
  var projEl = document.getElementById('qa-proj');
  var kindEl = document.getElementById('qa-kind');
  var mkEl   = document.getElementById('qa-mk');
  if (projEl && kindEl && mkEl){
    function applySmartDefault(){
      var key = projEl.value+'|'+kindEl.value;
      var d = {};
      try { d = JSON.parse(localStorage.getItem('matMkDefaults')||'{}'); } catch(e){}
      if (d[key]!=null) return; // you've used this combo before — your last % stands
      var v;
      if (kindEl.value==='sub'){
        var s = projField(projEl.value, 'subMarkup');
        v = (s!=null) ? s : 0;
      } else {
        var pm = projField(projEl.value, 'markup');
        v = (pm!=null) ? pm : 15;
      }
      mkEl.value = v;
      mkEl.dispatchEvent(new Event('input')); // refresh the green "bills $" box
    }
    projEl.addEventListener('change', applySmartDefault);
    kindEl.addEventListener('change', applySmartDefault);
    if (typeof window.openMaterials === 'function'){
      var _open3 = window.openMaterials;
      window.openMaterials = async function(){ await _open3(); applySmartDefault(); };
    }
  }

  // ── Materials Log footer: add BILLED total next to the cost total (private view) ──
  if (typeof window.renderMatList === 'function'){
    var _rml = window.renderMatList;
    window.renderMatList = function(){
      _rml.apply(this, arguments);
      try {
        if (typeof applyMatFilters !== 'function') return;
        var items = applyMatFilters().items || [];
        var billed = 0;
        for (var i=0;i<items.length;i++){
          var m = items[i];
          billed += parseFloat(m.amount||0) * (1 + window.__itemPct(m, m.project)/100);
        }
        var el = document.getElementById('mat-f-total');
        if (el && items.length){
          el.insertAdjacentHTML('beforeend',
            '<span style="color:#7ecb8f;font-size:12px;margin-left:14px" title="With each item\'s markup applied — only you see this">Billed: <strong>$'
            + billed.toFixed(2) + '</strong></span>');
        }
      } catch(e){ /* never break the list */ }
    };
  }

  // ── Job panel: all-time cost + markup breakdown under "Total Materials & Subs (billed)" ──
  if (typeof window.renderJobPanel === 'function'){
    var _rjp = window.renderJobPanel;
    window.renderJobPanel = function(proj){
      var html = _rjp.apply(this, arguments);
      try {
        if (typeof entriesForProject !== 'function') return html;
        var allEnt = entriesForProject(proj) || [];
        var cost = 0, markup = 0;
        for (var i=0;i<allEnt.length;i++){
          var mats = allEnt[i].materials || [];
          for (var j=0;j<mats.length;j++){
            var c = parseFloat(mats[j].cost||0);
            cost += c;
            markup += c * (window.__itemPct(mats[j], proj)/100);
          }
        }
        if (cost > 0){
          var line = '<div class="tot-row" style="color:#7a8aa0;font-size:11px">'
            + '<span class="lbl">\u21B3 cost $' + cost.toFixed(2)
            + ' \u00B7 markup $' + markup.toFixed(2)
            + ' <span style="color:#556">(all time \u2014 only visible to you)</span></span><span></span></div>';
          // insert just above the GRAND TOTAL row — split/join is $-safe
          var marker = '<div class="tot-row grand"';
          var parts = html.split(marker);
          if (parts.length === 2) html = parts[0] + line + marker + parts[1];
        }
      } catch(e){ /* never break the panel */ }
      return html;
    };
    if (typeof window.renderJobPanels === 'function') try { renderJobPanels(); } catch(e){}
  }
})();
</script>

<script>
(function(){
  window.renderJobPanel = function(proj){
  const color=jobColor(proj);
  const rate=billingRate(proj);
  const oosR=oosRateFor(proj);
  const ent=entriesForProjectMonth(proj,displayYear,displayMonth);
  const allEntRaw=entriesForProject(proj);
  const projCOs=(((typeof data!=='undefined'?data.changeOrders:null)||{})[proj]||[]).filter(c=>c.status==='open');
  const stripCO=list=>list.map(e=>({...e,crew:(e.crew||[]).filter(c=>!c.coId),materials:(e.materials||[]).filter(m=>!m.coId)}));
  const allEnt=projCOs.length?stripCO(allEntRaw):allEntRaw;
  const entRaw=ent;
  const entBase=projCOs.length?stripCO(entRaw):entRaw;
  const weeks=monthWeeks(displayYear,displayMonth);
  const payments=((data.payments||{})[proj]||[]);
  const projId=proj.replace(/[^a-z0-9]/gi,'_');

  // Crew set
  const crewSet=new Set();
  for(const en of entBase)for(const c of(en.crew||[]))crewSet.add(normName(c.name));
  const crew=[...CREW_ORDER.filter(c=>crewSet.has(c)),...[...crewSet].filter(c=>!CREW_ORDER.includes(c))];

  // Weekly hours table
  let wkCols=weeks.map((wk,wi)=>`<th style="cursor:default">Wk ${wk.n}</th>`).join('')+'<th>Total</th><th>Billed</th>';
  let wkRows='';const wkLabor=weeks.map(()=>0);let grandLaborHrs=0;
  const wkOOSHrs=weeks.map(()=>0);
  for(const worker of crew){
    const wkHrs=weeks.map(wk=>workerHours(entriesInWeek(entBase,wk.start,wk.end),worker));
    const total=wkHrs.reduce((a,b)=>a+b,0);grandLaborHrs+=total;
    wkHrs.forEach((h,i)=>wkLabor[i]+=h);
    const billed=total*rate;
    wkRows+=`<tr>
      <td>${esc(worker)}</td>
      ${wkHrs.map((h,wi)=>`<td class="hrs-cell${h===0?' zero':''}" onclick="openWeekModal('${esc(proj)}','${esc(worker)}',${wi})" title="Click to edit ${worker} Week ${wi+1}">${h===0?'—':h}</td>`).join('')}
      <td><strong>${total}</strong></td>
      <td>${billed>0?fmt$(billed):'—'}</td>
    </tr>`;
  }
  // Tally OOS hours per week (legacy safety — new OOS work will go through the CO system)
  weeks.forEach((wk,wi)=>{
    const wkEnt=entriesInWeek(entBase,wk.start,wk.end);
    for(const en of wkEnt)for(const c of(en.crew||[])){if(c.outOfScope)wkOOSHrs[wi]+=parseFloat(c.hours||0);else wkOOSHrs[wi]+=parseFloat(c.oosHours||0);}
  });
  const grandOOSHrs=wkOOSHrs.reduce((a,b)=>a+b,0);
  const wkLaborTotals=wkLabor.map(h=>fmt$(h*rate)).join('</td><td>');
  const totalLabor=grandLaborHrs*rate;
  wkRows+=`<tr class="wk-labor"><td>Wk Labor $</td><td>${wkLaborTotals}</td><td></td><td>${fmt$(totalLabor)}</td></tr>`;
  if(grandOOSHrs>0){
    const oosHrCells=wkOOSHrs.map(h=>h>0?h:'—').join('</td><td>');
    const oosLabCells=wkOOSHrs.map(h=>h>0?fmt$(h*oosR):'—').join('</td><td>');
    wkRows+=`<tr class="wk-oos"><td>↳ OOS Hrs</td><td>${oosHrCells}</td><td>${grandOOSHrs}</td><td>—</td></tr>`;
    wkRows+=`<tr class="wk-oos-labor"><td>↳ OOS Labor $</td><td>${oosLabCells}</td><td></td><td>${fmt$(grandOOSHrs*oosR)}</td></tr>`;
  }

  // ── THIS MONTH's materials list (activity only — quiet styling) ──
  const matItems=[];
  for(const en of entBase)for(let mi=0;mi<(en.materials||[]).length;mi++){
    const m=en.materials[mi];if(m.description||m.cost)matItems.push({date:en.date,m,mi});
  }
  const matsSub=matItems.reduce((s,{m})=>s+parseFloat(m.cost||0),0);
  const matsMarkup=matItems.reduce((s,{m})=>s+parseFloat(m.cost||0)*(window.__itemPct(m,proj)/100),0);
  const matsTotal2=matsSub+matsMarkup;
  const monthSubPay=matItems.reduce((s,{m})=>s+(m.kind==='sub'?parseFloat(m.cost||0):0),0);

  let matsRows=matItems.length===0
    ?`<div style="font-size:12px;color:#444;padding:4px 0">No materials logged this month — <a style="color:var(--accent);cursor:pointer" onclick="openDayModal('${today}')">add one</a></div>`

            <div class="add-pay-row">
              <div><div style="font-size:10px;color:#888;margin-bottom:3px">Amount ($)</div><input type="number" id="pf-amt-${projId}" placeholder="0.00"></div>
              <div><div style="font-size:10px;color:#888;margin-bottom:3px">Notes</div><input type="text" id="pf-notes-${projId}" placeholder="Optional"></div>
            </div>
            <button class="add-pay-btn" onclick="savePayment('${esc(proj)}','${projId}')">💾 Save Payment</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
  };

  // repaint immediately with the new layout
  if (typeof window.renderJobPanels === 'function') try { renderJobPanels(); } catch(e){}
})();
</script>

<script>
(function(){
  // ---- 1) Job Panel Proposal block (same as before) ----
  const _origRenderJobPanel = window.renderJobPanel;
  window.renderJobPanel = function(proj){
    let html = _origRenderJobPanel(proj);
    const p = getLatestProposal(proj);
    if (p) {
      const block = buildProposalStatusHtml(p);
      html = html.replace('<div class="pay-section">', block + '<div class="pay-section">');
    }
    return html;
  };

  function getLatestProposal(proj){
    const list = (data.proposals || []).filter(x => x.project === proj);
    if (!list.length) return null;
    return list.slice().sort((a, b) => new Date(b.sentDate) - new Date(a.sentDate))[0];
  }

  function fmtWhen(iso){
    return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  function buildProposalStatusHtml(p){
    const views = (p.viewedDates || []).length;
    const lastView = views ? fmtWhen(p.viewedDates[p.viewedDates.length - 1]) : null;
    const link = window.location.origin + '/proposal/' + p.id;

    if (p.status === 'accepted') {
      return `<div class="proj-totals" style="border-top:2px solid #2a9a2a;padding-top:8px">
        <div class="mat-label" style="margin-bottom:4px;color:#7be07b">Proposal</div>
        <div class="tot-row"><span class="lbl">Status</span><span style="color:#7be07b;font-weight:bold">\u{1F7E2} Accepted</span></div>
        <div class="tot-row"><span class="lbl">Accepted by</span><span>${esc(p.acceptedBy || p.acceptedEmail || '\u2014')}</span></div>
        <div class="tot-row"><span class="lbl">Date</span><span>${fmtWhen(p.acceptedAt)}</span></div>
        <div style="margin-top:6px"><a href="${link}" target="_blank" style="color:var(--accent);font-size:12px">View Signed Copy \u2192</a></div>
      </div>`;
    }

    return `<div class="proj-totals" style="border-top:2px solid #3a5a8e;padding-top:8px">
      <div class="mat-label" style="margin-bottom:4px;color:#8ab4ff">Proposal</div>
      <div class="tot-row"><span class="lbl">Status</span><span style="color:#8ab4ff">\u{1F4E4} Sent \u2014 ${views ? 'Viewed ' + views + 'x' : 'Not yet viewed'}</span></div>
      <div class="tot-row"><span class="lbl">Sent</span><span>${fmtWhen(p.sentDate)}</span></div>
      ${lastView ? `<div class="tot-row"><span class="lbl">Last viewed</span><span>${lastView}</span></div>` : ''}
      <div style="margin-top:6px"><a href="${link}" target="_blank" style="color:var(--accent);font-size:12px">View Proposal Link \u2192</a></div>
    </div>`;
  }

  if (typeof window.renderJobPanels === 'function') try { renderJobPanels(); } catch(e){}

  // ---- 2) Top-level Proposals activity bar (like Today's Appointments / Flags & Alerts) ----
  const css = ''
    + '.prop-card{background:var(--panel);border-radius:12px;margin:0 20px 16px;overflow:hidden}'
    + '.prop-card-hdr{padding:12px 16px;font-weight:bold;font-size:14px;border-bottom:1px solid #2a3a5e}'
    + '.prop-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #1e2c47;font-size:13px;flex-wrap:wrap}'
    + '.prop-row:last-child{border-bottom:none}'
    + '.prop-empty{padding:10px 16px;font-size:12px;color:#667}'
    + '.prop-badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}'
    + '.prop-badge.sent{background:#1a2f4e;color:#8ab4ff}'
    + '.prop-badge.viewed{background:#2f2a1a;color:#ffce7a}'
    + '.prop-badge.accepted{background:#173a1a;color:#7be07b}'
    + 'html.light .prop-card{background:#fff}'
    + 'html.light .prop-row{border-color:#eee}';
  const st = document.createElement('style');
  st.textContent = css;
  document.head.appendChild(st);

  function escP(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

  function renderProposalsBar(){
    const wrapEl = document.getElementById('prop-card-wrap');
    if (!wrapEl) return;
    const list = (data.proposals || []).slice().sort((a, b) => {
      const at = new Date(a.acceptedAt || (a.viewedDates||[])[a.viewedDates.length-1] || a.sentDate);
      const bt = new Date(b.acceptedAt || (b.viewedDates||[])[b.viewedDates.length-1] || b.sentDate);
      return bt - at;
    }).slice(0, 8);

    if (!list.length) {
      wrapEl.innerHTML = '<div class="prop-card"><div class="prop-card-hdr">\u{1F4C4} Proposals</div><div class="prop-empty">No proposals sent yet.</div></div>';
      return;
    }

    const rows = list.map(p => {
      const views = (p.viewedDates || []).length;
      const link = window.location.origin + '/proposal/' + p.id;
      let badge, when, dotColor;
      if (p.status === 'accepted') {
        badge = '<span class="prop-badge accepted">\u{1F7E2} Accepted</span>';
        when = fmtWhen(p.acceptedAt);
        dotColor = '#2ecc40';
      } else if (views > 0) {
        badge = '<span class="prop-badge viewed">\u{1F441} Viewed ' + views + 'x</span>';
        when = 'Last viewed ' + fmtWhen(p.viewedDates[p.viewedDates.length-1]);
        dotColor = '#ffce30';
      } else {
        badge = '<span class="prop-badge sent">\u{1F4E4} Sent</span>';
        when = 'Sent ' + fmtWhen(p.sentDate);
        dotColor = '#ff9f1a';
      }
      const dot = '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + dotColor + ';margin-right:8px;flex:none"></span>';
      return '<div class="prop-row">'
        + '<span style="display:flex;align-items:center">' + dot + '<strong>' + escP(p.project) + '</strong>&nbsp;\u2014&nbsp;' + escP(p.clientName || p.clientEmail || '') + '</span>'
        + '<span style="display:flex;align-items:center;gap:8px">' + badge + '<span style="color:#778;font-size:11px">' + when + '</span>'
        + '<a href="' + link + '" target="_blank" style="color:var(--accent);font-size:11px">View \u2192</a></span>'
        + '</div>';
    }).join('');

    wrapEl.innerHTML = '<div class="prop-card"><div class="prop-card-hdr">\u{1F4C4} Proposals</div>' + rows + '</div>';
  }

  const flagsWrap = document.getElementById('flags-wrap');
  if (flagsWrap) {
    const wrap = document.createElement('div');
    wrap.id = 'prop-card-wrap';
    flagsWrap.parentNode.insertBefore(wrap, flagsWrap);
    renderProposalsBar();
    // Refresh alongside the rest of the dashboard
    const _origRender = window.render;
    if (typeof _origRender === 'function') {
      window.render = function(){ _origRender(); renderProposalsBar(); };
    }
  }
})();
</script>
<!-- ══ JOB PANEL — FIXED PRICE v1 — paste above </body>, AFTER the proposals snippet ══ -->
<script>
(function(){
  const _prevRenderJobPanel = window.renderJobPanel;

  function projectRecord(name){
    return (data.projects||[]).find(p=>(p.name||'').toLowerCase()===(name||'').toLowerCase());
  }
  function crewPayRate(name){
    const canon=normName(name).toLowerCase();
    const rec=(data.crew||[]).find(c=>{
      const n=(c.name||'').toLowerCase();
      const nick=(c.nickname||'').toLowerCase();
      return n===canon||nick===canon||n.includes(canon)||canon.includes(n);
    });
    return rec&&rec.hourlyRate?parseFloat(rec.hourlyRate):null;
  }
  window.getBurdenPct=function(){
    const v=parseFloat(data.payrollBurdenPct);
    return isNaN(v)?25:v;
  };
  window.saveBurdenPct=async function(projId){
    const inp=document.getElementById('burden-input-'+projId);
    const v=parseFloat(inp.value);
    if(isNaN(v)||v<0||v>100){inp.value=getBurdenPct();return;}
    data.payrollBurdenPct=v;
    await saveAll();
    render();
  };
  function fmtWhenFP(iso){
    return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }

  window.renderJobPanel = function(proj){
    const rec=projectRecord(proj);
    if(!rec||rec.billingType!=='fixed') return _prevRenderJobPanel(proj);

    // ══ FIXED PRICE PANEL ══
    const color=jobColor(proj);
    const contract=parseFloat(rec.contractAmount||0);
    const allEnt=entriesForProject(proj);           // ALL entries incl. CO-tagged — everything is cost on a fixed job
    const ent=entriesForProjectMonth(proj,displayYear,displayMonth);
    const weeks=monthWeeks(displayYear,displayMonth);
    const payments=((data.payments||{})[proj]||[]);
    const projId=proj.replace(/[^a-z0-9]/gi,'_');
    const projCOs=(((typeof data!=='undefined'?data.changeOrders:null)||{})[proj]||[]).filter(c=>c.status==='open');

    // Crew set (this month, for the weekly table)
    const crewSet=new Set();
    for(const en of ent)for(const c of(en.crew||[]))crewSet.add(normName(c.name));
    const crew=[...CREW_ORDER.filter(c=>crewSet.has(c)),...[...crewSet].filter(c=>!CREW_ORDER.includes(c))];

    // Weekly hours table — Cost column at crew PAY rate (not client billing rate)
    let wkCols=weeks.map(wk=>`<th style="cursor:default">Wk ${wk.n}</th>`).join('')+'<th>Total</th><th>Cost</th>';
    let wkRows='';const wkHrsTot=weeks.map(()=>0);let monthHrs=0;const missingRates=[];
    for(const worker of crew){
      const wkHrs=weeks.map(wk=>workerHours(entriesInWeek(ent,wk.start,wk.end),worker));
      const total=wkHrs.reduce((a,b)=>a+b,0);monthHrs+=total;
      wkHrs.forEach((h,i)=>wkHrsTot[i]+=h);
      const pr=crewPayRate(worker);
      if(pr==null&&total>0)missingRates.push(worker);
      const cost=pr!=null?total*pr:0;
      wkRows+=`<tr>
        <td>${esc(worker)}</td>
        ${wkHrs.map((h,wi)=>`<td class="hrs-cell${h===0?' zero':''}" onclick="openWeekModal('${esc(proj)}','${esc(worker)}',${wi})" title="Click to edit ${worker} Week ${wi+1}">${h===0?'—':h}</td>`).join('')}
        <td><strong>${total}</strong></td>
        <td>${pr!=null?(cost>0?fmt$(cost):'—'):'<span style="color:#b06060" title="No pay rate on crew record">no rate</span>'}</td>
      </tr>`;
    }
    const wkHrCells=wkHrsTot.map(h=>h>0?h+'hr':'—').join('</td><td>');
    wkRows+=`<tr class="wk-labor"><td>Wk Hours</td><td>${wkHrCells}</td><td><strong>${monthHrs}hr</strong></td><td></td></tr>`;

    // ── ALL-TIME job costing ──
    let hrsToDate=0, laborCost=0;
    const perWorker={};
    for(const en of allEnt)for(const c of(en.crew||[])){
      const h=parseFloat(c.hours||0)+parseFloat(c.oosHours||0);
      if(h<=0)continue;
      const nm=normName(c.name);
      hrsToDate+=h;
      perWorker[nm]=(perWorker[nm]||0)+h;
    }
    for(const [nm,h] of Object.entries(perWorker)){
      const pr=crewPayRate(nm);
      if(pr!=null)laborCost+=h*pr;
      else if(!missingRates.includes(nm))missingRates.push(nm);
    }
    const burdenPct=getBurdenPct();
    const burdenAmt=laborCost*(burdenPct/100);

    // Materials + subs at RAW cost (no markup — markup is a T&M billing concept)
    let matCost=0, subCost=0;
    for(const en of allEnt)for(const m of(en.materials||[])){
      const c=parseFloat(m.cost||0);
      if(m.kind==='sub')subCost+=c;else matCost+=c;
    }
    const totalCost=laborCost+burdenAmt+matCost+subCost;

    // This month materials list (raw cost)
    const matItems=[];
    for(const en of ent)for(let mi=0;mi<(en.materials||[]).length;mi++){
      const m=en.materials[mi];if(m.description||m.cost)matItems.push({date:en.date,m,mi});
    }
    const monthMatCost=matItems.reduce((s,{m})=>s+parseFloat(m.cost||0),0);
    let matsRows=matItems.length===0
      ?`<div style="font-size:12px;color:#444;padding:4px 0">No materials logged this month — <a style="color:var(--accent);cursor:pointer" onclick="openDayModal('${today}')">add one</a></div>`
      :matItems.map(({date,m,mi})=>`
        <div class="mat-row-wrap">
          <span class="mat-row-desc" title="${esc(m.description)}">${m.kind==='sub'?'<span style="font-size:9px;background:#3a2a10;color:#ffce7a;border-radius:3px;padding:0 4px;margin-right:4px">SUB</span>':''}${esc(date.slice(5))} ${esc(m.description)}</span>
          <span class="mat-row-amt">${fmt$(m.cost)}</span>
          <button class="mat-icon-btn edit" onclick="openEditMat('${esc(proj)}','${esc(date)}')" title="Edit">✎</button>
          <button class="mat-icon-btn del" onclick="deleteMatInPanel('${esc(proj)}','${esc(date)}',${mi})" title="Delete">✕</button>
        </div>`).join('');
    if(matItems.length>0)matsRows+=`<div class="mat-total-row" style="border-top:1px solid #2a3a5e"><span class="lbl" style="color:#889;font-size:11px">Month Total (cost)</span><span class="amt" style="color:#99a;font-size:11px;font-weight:normal">${fmt$(monthMatCost)}</span></div>`;

    // ── Contract status from proposal system ──
    const props=(data.proposals||[]).filter(x=>x.project===proj).sort((a,b)=>new Date(b.sentDate)-new Date(a.sentDate));
    const prop=props[0]||null;
    let statusRow='';
    if(prop&&prop.status==='accepted'){
      statusRow=`<div class="tot-row"><span class="lbl">Contract Status</span><span style="color:#7be07b;font-weight:bold">\u{1F7E2} Accepted ${fmtWhenFP(prop.acceptedAt)}</span></div>`;
    }else if(prop){
      const views=(prop.viewedDates||[]).length;
      statusRow=`<div class="tot-row"><span class="lbl">Contract Status</span><span style="color:#8ab4ff">\u{1F4E4} Proposal sent${views?' \u00b7 viewed '+views+'x':''}</span></div>`;
    }

    // ── Change orders (same rules as v2.4 — separate revenue on top of contract) ──
    let coSectionHtml='', coGrand=0;
    if(projCOs.length){
      const oosR=oosRateFor(proj);
      const coBlocks=projCOs.map(co=>{
        let hrs=0, coMatCost=0, coMatBilled=0, lines=[];
        for(const en of allEnt){
          for(const c of(en.crew||[]))if(c.coId===co.id){const h=parseFloat(c.hours||0);hrs+=h;if(h>0)lines.push(`${esc(en.date.slice(5))} ${esc(c.name)} — ${h}hr`);}
          for(const m of(en.materials||[]))if(m.coId===co.id){const cc=parseFloat(m.cost||0);coMatCost+=cc;coMatBilled+=cc*(1+window.__itemPct(m,proj)/100);lines.push(`${esc(en.date.slice(5))} ${esc(m.description||'')} — ${fmt$(cc)}`);}
        }
        const billed=co.type==='fixed'?parseFloat(co.fixedAmount||0):(hrs*oosR+coMatBilled);
        coGrand+=billed;
        const meta=co.type==='fixed'?`FIXED ${fmt$(parseFloat(co.fixedAmount||0))}`:`T&M \u00b7 ${hrs}hr @ $${oosR}/hr${coMatBilled>0?' + materials':''}`;
        return `<div style="padding:4px 0 2px">
          <div class="tot-row"><span class="lbl" style="color:#ffce7a">CO #${co.num} — ${esc(co.name)} <span style="color:#997a44;font-size:10px">${meta}</span></span><span style="color:#ffce7a">${fmt$(billed)}</span></div>
          ${lines.length?`<div style="font-size:11px;color:#667;padding-left:12px">${lines.join('<br>')}</div>`:''}
        </div>`;
      }).join('');
      coSectionHtml=`<div class="proj-totals" style="border-top:1px solid #7a5a20;padding-top:8px">
        <div class="mat-label" style="margin-bottom:4px;color:#ffce7a">Change Orders</div>
        ${coBlocks}
        <div class="tot-row" style="border-top:1px solid #3a2a10"><span class="lbl" style="color:#ffce7a;font-weight:bold">CHANGE ORDERS TOTAL</span><span style="color:#ffce7a;font-weight:bold">${fmt$(coGrand)}</span></div>
      </div>`;
    }

    const revenue=contract+coGrand;
    const estProfit=revenue-totalCost;
    const totalPaid=payments.reduce((s,p)=>s+parseFloat(p.amount||0),0);
    const balanceDue=revenue-totalPaid;
    const profitColor=estProfit>=0?'#7be07b':'#ff7070';
    const balColor=balanceDue<=0?'paid':'';

    const missingNote=missingRates.length
      ?`<div style="font-size:11px;color:#b06060;padding:2px 0 4px">\u26A0 No pay rate on crew record for: ${missingRates.map(esc).join(', ')} — their hours are excluded from labor cost. Add rates in Data \u2192 Crew.</div>`
      :'';

    const payRows=payments.length===0
      ?'<div style="font-size:12px;color:#444;padding:4px 0">No payments recorded</div>'
      :`<div class="pay-row hdr"><span>Date</span><span>Check</span><span>Amount</span><span>Notes</span></div>`
      +payments.map(p=>`<div class="pay-row"><span>${p.date||''}</span><span>${p.check||''}</span><span>${fmt$(p.amount||0)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.notes||'')}</span></div>`).join('');

    return `<div class="job-panel">
      <div class="jp-header" style="background:${color}">
        <span>${esc(proj)} <span style="font-size:10px;background:rgba(0,0,0,.25);border-radius:4px;padding:1px 6px;margin-left:6px;letter-spacing:.5px">FIXED PRICE</span></span>
        <span style="font-size:12px;opacity:.9">Contract ${fmt$(contract)}</span>
      </div>
      <div class="jp-body">
        <div class="wk-table-wrap">
          <div class="mat-label">Weekly Hours <span style="font-size:10px;color:#666;font-weight:normal;text-transform:none">— job costing, not billed \u00b7 click any cell to edit</span></div>
          <table class="wk-table"><thead><tr><th>Worker</th>${wkCols}</tr></thead><tbody>${wkRows}</tbody></table>
        </div>
        <div class="mat-section">
          <div class="mat-label" style="color:#889">Materials &amp; Subs <span style="font-size:10px;color:#666;font-weight:normal;text-transform:none">— this month, at cost</span></div>
          ${matsRows}
          <button class="mat-add-btn" onclick="openDayModal('${today}')">+ Add Material (log to today)</button>
        </div>
        <div class="proj-totals" style="border-top:2px solid var(--accent);padding-top:8px">
          <div class="mat-label" style="margin-bottom:6px">Contract &amp; Job Costing</div>
          <div class="tot-row"><span class="lbl" style="font-weight:bold">Contract Price</span><span style="font-weight:bold">${fmt$(contract)}</span></div>
          ${statusRow}
          <div class="tot-row"><span class="lbl">Hours To Date</span><span>${hrsToDate}hr</span></div>
          ${missingNote}
          <div class="tot-row"><span class="lbl">Labor Cost (crew pay)</span><span>${fmt$(laborCost)}</span></div>
          <div class="tot-row"><span class="lbl">Payroll Burden (est.)
            <input id="burden-input-${projId}" type="number" min="0" max="100" step="0.5" value="${burdenPct}" onchange="saveBurdenPct('${projId}')" style="width:52px;background:#0f1a2e;border:1px solid #2a3a5e;border-radius:4px;color:var(--text);padding:1px 4px;font-size:11px;margin:0 3px;text-align:right">%
            <span style="font-size:10px;color:#667;text-transform:none;font-weight:normal">taxes + workers comp</span></span><span>${fmt$(burdenAmt)}</span></div>
          <div class="tot-row"><span class="lbl">Materials Cost</span><span>${fmt$(matCost)}</span></div>
          ${subCost>0?`<div class="tot-row"><span class="lbl">Subs Cost</span><span>${fmt$(subCost)}</span></div>`:''}
          <div class="tot-row" style="border-top:1px solid #2a3a5e"><span class="lbl" style="font-weight:bold">Est. Total Cost</span><span style="font-weight:bold">${fmt$(totalCost)}</span></div>
          <div class="tot-row"><span class="lbl" style="font-weight:bold;color:${profitColor}">Est. Gross Profit</span><span style="font-weight:bold;color:${profitColor}">${fmt$(estProfit)}${revenue>0?' <span style="font-size:10px;font-weight:normal">('+Math.round(estProfit/revenue*100)+'%)</span>':''}</span></div>
        </div>
        ${coSectionHtml}
        <div class="proj-totals" style="border-top:2px solid var(--accent);padding-top:6px">
          <div class="tot-row grand"><span class="lbl">GRAND TOTAL${projCOs.length?' DUE':''}</span><span>${fmt$(revenue)}</span></div>
        </div>
        <div class="pay-section">
          <div class="pay-label">Payments Received</div>
          ${payRows}
          <div class="pay-total-row"><span>Total Paid</span><span>${fmt$(totalPaid)}</span></div>
          <div class="balance-due">
            <span class="lbl">BALANCE DUE</span>
            <span class="amt ${balColor}">${fmt$(Math.abs(balanceDue))}${balanceDue<=0?' \u2713':''}</span>
          </div>
          <button class="add-pay-toggle" onclick="togglePayForm('${projId}')">+ Log Payment</button>
          <div id="payform-${projId}" style="display:none">
            <div class="add-pay-form" style="margin-top:8px">
              <div class="add-pay-row">
                <div><div style="font-size:10px;color:#888;margin-bottom:3px">Date</div><input type="date" id="pf-date-${projId}" value="${today}"></div>
                <div><div style="font-size:10px;color:#888;margin-bottom:3px">Check #</div><input type="text" id="pf-check-${projId}" placeholder="Optional"></div>
              </div>
              <div class="add-pay-row">
                <div><div style="font-size:10px;color:#888;margin-bottom:3px">Amount ($)</div><input type="number" id="pf-amt-${projId}" placeholder="0.00"></div>
                <div><div style="font-size:10px;color:#888;margin-bottom:3px">Notes</div><input type="text" id="pf-notes-${projId}" placeholder="Optional"></div>
              </div>
              <button class="add-pay-btn" onclick="savePayment('${esc(proj)}','${projId}')">\u{1F4BE} Save Payment</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  };

  if (typeof window.renderJobPanels === 'function') try { renderJobPanels(); } catch(e){}
})();
</script>
